<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#08090f" id="theme-meta">
<meta name="description" content="GCC AI & Tech Intelligence Brief">
<title>GCC Intel · Daily Brief</title>
<link rel="icon" type="image/png" href="/gmr-favicon.png">
<link rel="apple-touch-icon" href="/gmr-favicon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
/* ── THEME VARIABLES ──────────────────────────────────────────────────── */
:root,[data-theme="light"]{
  --bg:#f2f3f7;--bg2:#ffffff;--surface:#ffffff;--surface2:#f3f4f6;--surface3:#e5e7eb;
  --border:rgba(0,0,0,.06);--border2:rgba(0,0,0,.10);--border3:rgba(0,0,0,.18);
  --text:#111827;--text2:#4b5563;--text3:#9ca3af;
  --gold:#f59e0b;--green:#10b981;--teal:#0d9488;--accent:#3b82f6;--red:#dc2626;
  --serif:'Playfair Display',Georgia,serif;--sans:'Plus Jakarta Sans',system-ui,sans-serif;
  --r:12px;--rl:16px;--hh:64px;
  --save-idle:#d1d5db;--save-on:#f59e0b;
  --card-sh:0 1px 3px rgba(0,0,0,.07),0 4px 16px rgba(0,0,0,.06);
  color-scheme:light;
}
[data-theme="dark"]{
  --bg:#0f1117;--bg2:#16192a;--surface:#1a1d2e;--surface2:#1f2236;--surface3:#252840;
  --border:rgba(255,255,255,.07);--border2:rgba(255,255,255,.12);--border3:rgba(255,255,255,.2);
  --text:#e8e3d5;--text2:#8e8eab;--text3:#4a4a6e;
  --gold:#c9a84c;--green:#10b981;--teal:#4db6ac;--accent:#4f8ef7;--red:#ef4444;
  --save-idle:#4a4a6e;--save-on:#c9a84c;
  --card-sh:0 1px 3px rgba(0,0,0,.3),0 4px 16px rgba(0,0,0,.4);
  color-scheme:dark;
}

/* ── RESET ─────────────────────────────────────────────────────────────── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{height:100%;font-size:16px}
body{min-height:100%;font-family:var(--sans);background:var(--bg);color:var(--text);-webkit-tap-highlight-color:transparent;transition:background .2s,color .2s}
button{font-family:var(--sans);cursor:pointer}
a{color:inherit;text-decoration:none}
img{max-width:100%;display:block}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-thumb{background:var(--surface3);border-radius:4px}

/* ── HEADER ─────────────────────────────────────────────────────────────── */
.hdr{position:fixed;top:0;left:0;right:0;z-index:100;height:var(--hh);background:rgba(255,255,255,.92);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 22px;gap:12px}
[data-theme="dark"] .hdr{background:rgba(22,25,42,.92)}
.hdr-left{display:flex;align-items:center;gap:10px;flex-shrink:0}
.back-btn{display:none;align-items:center;justify-content:center;width:32px;height:32px;border-radius:8px;border:1px solid var(--border2);background:var(--surface2);color:var(--text2);font-size:16px;transition:background .12s;flex-shrink:0}
.back-btn:hover{background:var(--surface3)}
.back-btn.visible{display:flex}
.brand-wrap{cursor:pointer;flex-shrink:0;display:flex;align-items:center}
.brand-logo-row{display:flex;align-items:center;gap:8px}
.brand-icon{width:48px;height:48px;object-fit:contain;flex-shrink:0;display:block;border-radius:6px;-webkit-user-drag:none;user-select:none;transition:opacity .18s}
.brand-wrap:hover .brand-icon{opacity:.8}
.brand-text{display:flex;flex-direction:column;justify-content:center;min-width:0}
.brand-title{font-family:var(--sans);font-size:14px;color:var(--text);font-weight:700;letter-spacing:-.2px;line-height:1.2}
.brand-sub{font-size:9px;text-transform:uppercase;letter-spacing:1.5px;color:var(--text3);margin-top:1px}
.hdr-sec-info{display:none!important}
/* Search bar */
.hdr-search{flex:1;max-width:380px;position:relative}
.hdr-search-icon{position:absolute;left:13px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:13px;pointer-events:none}
.hdr-search-input{width:100%;padding:9px 16px 9px 36px;border-radius:24px;border:none;background:var(--surface2);color:var(--text);font-family:var(--sans);font-size:13px;font-weight:500;outline:none;transition:background .15s}
.hdr-search-input::placeholder{color:var(--text3)}
.hdr-search-input:focus{background:var(--surface3)}
.hdr-right{display:flex;align-items:center;gap:8px;flex-shrink:0}
.hdr-btn{display:flex;align-items:center;gap:5px;padding:7px 12px;border-radius:20px;border:1px solid var(--border2);background:transparent;color:var(--text2);font-size:11px;font-weight:600;transition:all .12s;white-space:nowrap}
.hdr-btn:hover{background:var(--surface2);color:var(--text)}
.hdr-btn .hdr-btn-icon{font-size:14px}
.hdr-btn.notif-btn.active{border-color:var(--gold);color:var(--gold);background:rgba(245,158,11,.08)}
.theme-btn{display:flex;align-items:center;justify-content:center;width:34px;height:34px;border-radius:50%;border:1px solid var(--border2);background:transparent;color:var(--text2);font-size:14px;transition:all .12s}
.theme-btn:hover{background:var(--surface2);color:var(--text)}

/* ── PAGE ─────────────────────────────────────────────────────────────────── */
#page{margin-top:var(--hh);min-height:calc(100vh - var(--hh));padding-bottom:calc(64px + env(safe-area-inset-bottom))}

/* ── PROGRESS PANEL ──────────────────────── */
#progress-panel{
  display:none;position:fixed;bottom:28px;left:50%;transform:translateX(-50%);z-index:200;
  background:var(--surface);border:1px solid var(--border2);border-radius:16px;
  padding:16px 20px;min-width:320px;max-width:90vw;
  box-shadow:0 8px 32px rgba(0,0,0,.4);
}
#progress-panel.visible{display:block}
.pp-title{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:1.5px;color:var(--teal);margin-bottom:10px}
.pp-status{font-size:12px;color:var(--text2);margin-bottom:10px;min-height:16px}
.progress-bar-wrap{height:6px;border-radius:3px;background:var(--surface3);overflow:hidden;margin-bottom:10px}
.progress-bar{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--teal),var(--accent));transition:width .4s ease;width:0%}
.pp-rows{display:flex;flex-direction:column;gap:4px}
.pp-row{display:flex;align-items:center;gap:8px;font-size:11px;color:var(--text3)}
.pp-row .pp-dot{width:7px;height:7px;border-radius:50%;background:var(--surface3);flex-shrink:0;transition:background .2s}
.pp-row.active .pp-dot{background:var(--accent);animation:pulse .8s infinite}
.pp-row.done .pp-dot{background:var(--green)}
.pp-row.fail .pp-dot{background:var(--red)}
.pp-row.active,.pp-row.done,.pp-row.fail{color:var(--text2)}
.pp-row .pp-label{flex:1}
.pp-row .pp-count{font-size:10px;color:var(--text3)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

/* ── HOME VIEW ───────────────────────────────────────────────────────────── */
#hview{padding:24px 24px 32px;max-width:1400px;margin:0 auto}
.home-date-bar{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:18px;padding-bottom:0;border-bottom:none}
.home-eyebrow{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:2.5px;color:var(--text3);margin-bottom:5px}
.home-greeting{font-family:var(--sans);font-size:30px;font-weight:800;color:var(--text);letter-spacing:-.8px;line-height:1.1}
.home-greeting span{color:var(--gold)}
.home-date{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:1.2px}
.home-sub{font-size:10px;color:var(--text2);margin-top:3px}
.home-meta-col{text-align:right;flex-shrink:0;padding-top:2px}
.home-sub{font-size:10px;color:var(--teal);font-weight:600}
.lr{font-size:9px;color:var(--text3);margin-top:2px}
.hp-date-row{display:flex;align-items:center;gap:6px;margin-top:5px;justify-content:flex-end}
.hp-date-label{font-size:9px;color:var(--text3)}
.hp-date-input{padding:4px 8px;border-radius:8px;border:1px solid var(--border2);background:var(--surface2);color:var(--text);font-family:var(--sans);font-size:10px;outline:none;cursor:pointer;color-scheme:light dark}
.hp-date-input:focus{border-color:var(--accent)}
.hp-history-banner{display:flex;align-items:center;justify-content:space-between;gap:12px;background:rgba(245,158,11,.07);border:1px solid rgba(245,158,11,.22);border-radius:10px;padding:9px 14px;margin-bottom:14px;animation:fadeIn .25s ease both}
.hp-history-banner span{font-size:12px;color:var(--gold);font-weight:500}
.hp-today-btn{padding:5px 12px;border-radius:8px;border:1px solid var(--gold);background:transparent;color:var(--gold);font-size:11px;font-family:var(--sans);font-weight:700;cursor:pointer;transition:all .15s;white-space:nowrap}
.hp-today-btn:hover{background:var(--gold);color:#fff}
/* Section filter chips */
.sec-chips-row{display:flex;gap:8px;overflow-x:auto;padding:0 0 16px;scrollbar-width:none;-webkit-overflow-scrolling:touch}
.sec-chips-row::-webkit-scrollbar{display:none}
.sec-chip{flex-shrink:0;padding:7px 16px;border-radius:24px;border:1px solid var(--border2);background:transparent;color:var(--text2);font-size:11px;font-weight:600;font-family:var(--sans);cursor:pointer;transition:all .15s;white-space:nowrap}
.sec-chip:hover{background:var(--surface2);color:var(--text)}

/* ── HOME MASONRY GRID ───────────────────────────────────────────────────── */
.home-grid{columns:3 230px;column-gap:16px}
.sec-card{break-inside:avoid;display:inline-block;width:100%;margin-bottom:16px;vertical-align:top;background:var(--surface);border:none;border-radius:14px;box-shadow:var(--card-sh);overflow:hidden;cursor:pointer;transition:transform .2s,box-shadow .2s}
.sec-card:hover{transform:translateY(-3px);box-shadow:0 8px 32px rgba(0,0,0,.12),0 2px 6px rgba(0,0,0,.06)}
[data-theme="dark"] .sec-card:hover{box-shadow:0 8px 32px rgba(0,0,0,.5)}
/* Card image */
.sc-img-wrap{position:relative;overflow:hidden;background:linear-gradient(135deg,var(--sc,#e5e7eb),var(--sc2,#d1d5db))}
.sc-img-wrap img{width:100%;aspect-ratio:16/9;object-fit:cover;display:block;transition:transform .4s ease}
.sec-card:hover .sc-img-wrap img{transform:scale(1.04)}
/* Card body */
.sc-body{padding:14px 14px 12px}
.sc-src-row{display:flex;align-items:center;gap:7px;margin-bottom:8px}
.sc-src-dot{width:24px;height:24px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;color:#fff;flex-shrink:0;text-transform:uppercase}
.sc-src-lbl{font-size:11px;font-weight:600;color:var(--text3);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sc-src-time{font-size:10px;color:var(--text3);flex-shrink:0}
.sc-sec-tag{display:inline-block;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1.2px;padding:3px 9px;border-radius:20px;margin-bottom:8px}
.sc-title{font-size:14px;font-weight:700;color:var(--text);line-height:1.45;margin-bottom:7px;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.sc-preview{font-size:12px;color:var(--text2);line-height:1.6;margin-bottom:10px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.sc-foot{display:flex;align-items:center;justify-content:space-between;padding-top:10px;border-top:1px solid var(--border)}
.sc-foot-src{font-size:10px;color:var(--text3);font-weight:500}
.sc-count-pill{font-size:9px;font-weight:700;background:var(--surface2);color:var(--text3);padding:3px 8px;border-radius:12px}

/* ── SECTION VIEW ───────────────────────────────────────────────────────── */
#sview{display:none;padding:24px 24px 48px;max-width:1200px;margin:0 auto}
.sec-header{margin-bottom:22px;padding-bottom:14px;border-bottom:1px solid var(--border)}
.sec-header-ey{font-size:9px;color:var(--teal);text-transform:uppercase;letter-spacing:2.5px;margin-bottom:6px;font-weight:700;transition:color .2s}
.sec-header-title{font-family:var(--sans);font-size:26px;font-weight:800;color:var(--text);letter-spacing:-.5px;line-height:1;transition:color .2s}

/* Article cards grid */
.cards-2col{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.news-card{background:var(--surface);border:none;border-radius:14px;box-shadow:var(--card-sh);overflow:hidden;animation:fadeUp .25s ease both}
.nc-img{width:100%;aspect-ratio:16/9;object-fit:cover;display:block}
.nc-body{padding:18px 18px 16px}
.nc-meta{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:10px}
.nc-sec-chip{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1.2px;padding:3px 9px;border-radius:20px}
.nc-age{font-size:10px;color:var(--text3)}
.nc-pill{display:inline-flex;align-items:center;gap:4px;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1px;padding:4px 10px;border-radius:20px;margin-bottom:10px;border:1px solid transparent}
.nc-pill.p-risk{background:rgba(220,38,38,.08);color:#dc2626;border-color:rgba(220,38,38,.2)}
.nc-pill.p-opp{background:rgba(16,185,129,.08);color:#059669;border-color:rgba(16,185,129,.2)}
.nc-title{font-size:18px;font-weight:700;color:var(--text);line-height:1.35;margin-bottom:10px}
.nc-body-text{font-size:13px;color:var(--text2);line-height:1.65;margin-bottom:12px}
.nc-why{background:rgba(13,148,136,.06);border-left:3px solid var(--teal);border-radius:0 8px 8px 0;padding:10px 14px;margin-bottom:14px;font-size:12px;color:var(--text2);line-height:1.6}
.nc-why strong{display:block;font-size:9px;color:var(--teal);text-transform:uppercase;letter-spacing:2px;font-weight:700;margin-bottom:5px}
/* kept for legacy (archive mgview cards still use old classes) */
.why{background:rgba(13,148,136,.06);border-left:3px solid var(--teal);border-radius:0 8px 8px 0;padding:10px 14px;margin-bottom:14px;font-size:12px;color:var(--text2);line-height:1.6}
.why strong{display:block;font-size:9px;color:var(--teal);text-transform:uppercase;letter-spacing:2px;font-weight:700;margin-bottom:5px}
.ctitle{font-size:17px;font-weight:700;color:var(--text);line-height:1.35;margin-bottom:10px}
.cbody{font-size:13px;color:var(--text2);line-height:1.65;margin-bottom:12px}
.card-meta{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:10px}
.ctag{font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:1.2px;color:var(--text3)}
.cage{font-size:9px;color:var(--text3)}
/* fix vendor prefix warnings */
.sc-title,.sc-preview{line-clamp:3}
.sc-preview{line-clamp:2}
.nc-body-text em,.cbody em,.why em{font-style:normal}

/* article card footer */
.nc-foot{display:flex;align-items:center;justify-content:space-between;border-top:1px solid var(--border);padding-top:12px;margin-top:4px;gap:8px}
.nc-src-lbl{font-size:10px;color:var(--text3);font-weight:500}
.nc-actions{display:flex;align-items:center;gap:8px}
.read-src{font-size:11px;color:var(--accent);text-decoration:none;font-weight:600;transition:opacity .12s}
.read-src:hover{opacity:.7}
.save-btn{background:transparent;border:none;padding:2px 4px;border-radius:6px;font-size:15px;color:var(--save-idle);cursor:pointer;transition:color .15s,transform .1s;line-height:1}
.save-btn:hover{color:var(--save-on);transform:scale(1.15)}
.save-btn.saved{color:var(--save-on)}
.listen-btn{background:transparent;border:none;padding:2px 5px;border-radius:6px;font-size:14px;color:var(--text3);cursor:pointer;transition:color .15s;line-height:1}
.listen-btn:hover,.listen-btn.active{color:var(--teal)}
.divider{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:2px;color:var(--text3);padding:16px 0 8px;border-bottom:1px solid var(--border);margin-bottom:14px}
.divider.risk-div{color:#dc2626;border-color:rgba(220,38,38,.15)}
.divider.opp-div{color:#059669;border-color:rgba(16,185,129,.15)}
/* legacy cfoot for archive view */
.cfoot{display:flex;align-items:center;justify-content:space-between;border-top:1px solid var(--border);padding-top:12px;margin-top:4px;gap:8px}
.csrc-name{font-size:10px;color:var(--text3)}
.cfoot-right{display:flex;align-items:center;gap:8px}
.sl{border-radius:8px;background:var(--surface2);animation:sh 1.5s infinite;margin-bottom:8px}
@keyframes sh{0%,100%{opacity:.4}50%{opacity:.8}}
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;text-align:center}
.empty-state .ei{font-size:36px;opacity:.2;margin-bottom:14px}
.empty-state .em{font-size:14px;color:var(--text2);margin-bottom:6px;font-weight:600}
.empty-state .eh{font-size:12px;color:var(--text3)}

/* ── MANAGE DATA ──────────────────────────────────────────────────────────── */
#mgview{display:none;padding:24px 24px 48px;max-width:1000px;margin:0 auto}
.mg-controls{display:flex;align-items:center;gap:10px;margin-bottom:20px;flex-wrap:wrap}
.mg-date-input{padding:7px 12px;border-radius:var(--r);border:1px solid var(--border2);background:var(--surface);color:var(--text);font-family:var(--sans);font-size:12px;outline:none;color-scheme:light dark}
.mg-date-input:focus{border-color:var(--accent)}
.mg-btn{padding:7px 13px;border-radius:var(--r);border:1px solid var(--border2);background:transparent;color:var(--text2);font-size:11px;font-family:var(--sans);font-weight:600;transition:all .12s;white-space:nowrap;cursor:pointer}
.mg-btn:hover{background:var(--surface2);color:var(--text)}
.mg-btn.active{background:var(--accent);border-color:var(--accent);color:#fff}
.mg-btn:disabled{opacity:.5;cursor:not-allowed}
.confirm-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:900;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .18s}
.confirm-overlay.show{opacity:1;pointer-events:all}
.confirm-box{background:var(--surface);border:1px solid var(--border2);border-radius:14px;padding:24px 26px;max-width:360px;width:90%;box-shadow:0 20px 60px rgba(0,0,0,.15)}
.confirm-box h3{margin:0 0 8px;font-family:var(--sans);font-size:17px;font-weight:700;color:var(--text)}
.confirm-box p{margin:0 0 20px;font-size:13px;color:var(--text2);line-height:1.5}
.confirm-actions{display:flex;gap:8px;justify-content:flex-end}
.confirm-cancel{padding:7px 16px;border-radius:var(--r);border:1px solid var(--border2);background:transparent;color:var(--text2);font-size:12px;font-family:var(--sans);cursor:pointer;transition:all .12s}
.confirm-cancel:hover{background:var(--surface2)}
.confirm-ok{padding:7px 16px;border-radius:var(--r);border:none;font-size:12px;font-family:var(--sans);cursor:pointer;font-weight:700;transition:all .12s}
.confirm-ok.red{background:var(--red);color:#fff}.confirm-ok.red:hover{opacity:.85}
.confirm-ok.teal{background:var(--teal);color:#fff}.confirm-ok.teal:hover{opacity:.85}
.mg-nav-row{display:flex;align-items:center;gap:6px}
.mg-arrow{width:28px;height:28px;border-radius:8px;border:1px solid var(--border2);background:transparent;color:var(--text2);font-size:14px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:background .12s}
.mg-arrow:hover{background:var(--surface2);color:var(--text)}
.mg-date-label{font-size:12px;color:var(--text2);font-weight:600;min-width:130px;text-align:center}
.mg-section-filter{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:18px}
.mg-filter-chip{padding:4px 12px;border-radius:20px;border:1px solid var(--border2);background:transparent;color:var(--text3);font-size:10px;font-weight:600;font-family:var(--sans);transition:all .12s;cursor:pointer}
.mg-filter-chip:hover{background:var(--surface2);color:var(--text2)}
.mg-filter-chip.active{background:var(--accent);border-color:var(--accent);color:#fff}
.day-block{border:1px solid var(--border);border-radius:var(--rl);overflow:hidden;margin-bottom:14px;background:var(--surface)}
.day-header{padding:12px 16px;background:var(--surface2);display:flex;align-items:center;justify-content:space-between;cursor:pointer;user-select:none}
.day-date{font-size:13px;font-weight:700;color:var(--text)}
.day-count{font-size:10px;color:var(--text3);margin-left:10px}
.day-chevron{font-size:11px;color:var(--text3);transition:transform .2s}
.day-block.collapsed .day-chevron{transform:rotate(-90deg)}
.day-cards{padding:0 16px}
.day-block.collapsed .day-cards{display:none}
.mg-sec-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1.2px;color:var(--text3);padding:14px 0 6px;border-bottom:1px solid var(--border)}
.weekly-summary{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);padding:16px;margin-bottom:20px}
.ws-title{font-family:var(--sans);font-size:17px;font-weight:700;color:var(--text);margin-bottom:2px}
.ws-sub{font-size:11px;color:var(--text3);margin-bottom:14px}
.ws-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px}
.ws-day{border:1px solid var(--border);border-radius:var(--r);padding:10px 8px;cursor:pointer;transition:background .12s,border-color .12s;text-align:center}
.ws-day:hover{background:var(--surface2);border-color:var(--border2)}
.ws-day.today{border-color:var(--accent)}
.ws-day-name{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--text3);margin-bottom:3px}
.ws-day-date{font-size:11px;color:var(--text2);margin-bottom:5px;font-weight:500}
.ws-day-count{font-size:10px;color:var(--accent);font-weight:600}
.mg-refresh-btn{padding:8px 16px;border-radius:var(--r);border:1px solid var(--gold);background:transparent;color:var(--gold);font-size:12px;font-family:var(--sans);font-weight:700;cursor:pointer;transition:all .15s;white-space:nowrap;margin-bottom:16px}
.mg-refresh-btn:hover{background:var(--gold);color:#fff}
.mg-refresh-btn:disabled{opacity:.5;cursor:not-allowed;background:transparent}

/* ── TOAST / ANIMATIONS ──────────────────────────────────────────────────── */
.toast{position:fixed;bottom:76px;left:50%;transform:translateX(-50%);background:var(--surface);border:1px solid var(--border2);border-radius:24px;padding:9px 18px;font-size:12px;font-weight:500;color:var(--text2);z-index:500;opacity:0;transition:opacity .25s;pointer-events:none;white-space:nowrap;max-width:calc(100vw - 28px);text-align:center;box-shadow:0 4px 16px rgba(0,0,0,.1)}
.toast.show{opacity:1}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes cardIn{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}

/* ── BOTTOM TAB BAR ──────────────────────────────────────────────────────── */
.tab-bar{position:fixed;bottom:0;left:0;right:0;height:62px;background:var(--bg2);border-top:1px solid var(--border);display:flex;align-items:stretch;z-index:150;padding-bottom:env(safe-area-inset-bottom)}
.tab-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;cursor:pointer;border:none;background:none;color:var(--text3);transition:color .15s;font-family:var(--sans);-webkit-tap-highlight-color:transparent}
.tab-item.active{color:var(--accent)}
.tab-item:hover:not(.active){color:var(--text2)}
.tab-icon-svg{font-size:18px;line-height:1}
.tab-lbl{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.8px}

/* ── TTS PLAYER ──────────────────────────────────────────────────────────── */
.tts-bar{position:fixed;bottom:62px;left:0;right:0;z-index:400;background:var(--surface);border-top:1px solid var(--border2);padding:10px 20px;display:flex;align-items:center;gap:12px;transform:translateY(100%);transition:transform .32s cubic-bezier(.4,0,.2,1);box-shadow:0 -4px 20px rgba(0,0,0,.08)}
[data-theme="dark"] .tts-bar{box-shadow:0 -4px 20px rgba(0,0,0,.4)}
.tts-bar.visible{transform:translateY(0)}
.tts-wave{font-size:18px;color:var(--teal);flex-shrink:0}
.tts-info{flex:1;min-width:0}
.tts-badge{font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:2px;color:var(--teal);display:block;margin-bottom:2px}
.tts-now{font-size:11px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:block;font-weight:600}
.tts-controls{display:flex;align-items:center;gap:8px;flex-shrink:0}
.tts-speed-sel{padding:4px 8px;border-radius:8px;border:1px solid var(--border2);background:var(--surface2);color:var(--text2);font-size:10px;font-family:var(--sans);outline:none;cursor:pointer}
.tts-ctrl-btn{width:32px;height:32px;border-radius:50%;border:1px solid var(--border2);background:var(--surface2);color:var(--text2);font-size:13px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s;flex-shrink:0}
.tts-ctrl-btn:hover{background:var(--surface3)}
.tts-ctrl-btn.tts-play-btn{border-color:var(--teal);color:var(--teal);background:rgba(13,148,136,.08)}
.tts-ctrl-btn.tts-play-btn:hover{background:rgba(13,148,136,.18)}

/* ── RESPONSIVE ──────────────────────────────────────────────────────────── */
@media(max-width:1100px){.home-grid{columns:2 200px}.hdr-search{max-width:280px}}
@media(max-width:767px){
  :root{--hh:56px}
  .hdr{padding:0 14px;gap:10px}
  .brand-icon{width:38px;height:38px}
  .brand-sub{display:none}
  .hdr-search{max-width:none}
  .home-grid{columns:1}
  .home-greeting{font-size:24px}
  .home-date-bar{flex-direction:column;gap:6px;margin-bottom:14px}
  .home-meta-col{text-align:left}
  #hview,#sview,#mgview{padding-left:14px;padding-right:14px}
  .cards-2col{grid-template-columns:1fr}
  .sec-header-title{font-size:22px}
  .nc-title{font-size:16px}
  .ws-grid{grid-template-columns:repeat(4,1fr)}
  #progress-panel{bottom:76px;min-width:0;width:calc(100vw - 28px)}
}
@media(max-width:479px){
  :root{--hh:52px}
  .hdr{padding:0 12px}
  .brand-icon{width:32px;height:32px}
  .home-greeting{font-size:20px}
  .hdr-btn .hdr-btn-label{display:none}
  .hdr-btn{padding:6px 8px}
  .sec-chip{padding:6px 12px;font-size:10px}
  .home-grid{column-gap:12px}
  .sec-card{margin-bottom:12px}
  .ws-grid{grid-template-columns:repeat(3,1fr)}
}
</style>
</head>
<body>

<header class="hdr">
  <div class="hdr-left">
    <button class="back-btn" id="back-btn" onclick="goHome()">&#8592;</button>
    <div class="brand-wrap" onclick="goHome()">
      <div class="brand-logo-row">
        <img class="brand-icon" src="/gmr-logo.png" alt="GMR Group" draggable="false"/>
        <div class="brand-text">
          <div class="brand-title">GCC Intelligence</div>
          <div class="brand-sub">Chairman's Daily Brief</div>
        </div>
      </div>
    </div>
  </div>
  <div class="hdr-search">
    <span class="hdr-search-icon">🔍</span>
    <input class="hdr-search-input" type="search" placeholder="Search anything" id="search-input" oninput="handleSearch(this.value)" autocomplete="off"/>
  </div>
  <div class="hdr-right">
    <button class="hdr-btn notif-btn" id="notif-btn" onclick="toggleNotifications()" title="Toggle push notifications">
      <span class="hdr-btn-icon" id="notif-icon">🔔</span><span class="hdr-btn-label notif-label" id="notif-label">Notify</span>
    </button>
    <button class="theme-btn" id="theme-toggle" onclick="toggleTheme()">🌙</button>
  </div>
</header>

<!-- Live progress panel -->
<div id="progress-panel">
  <div class="pp-title">Fetching Intelligence Brief</div>
  <div class="pp-status" id="pp-status">Starting…</div>
  <div class="progress-bar-wrap"><div class="progress-bar" id="progress-bar"></div></div>
  <div class="pp-rows" id="pp-rows"></div>
</div>

<div id="page">
  <div id="hview">
    <div class="home-date-bar" style="animation:fadeIn .5s ease both">
      <div>
        <div class="home-eyebrow" id="home-date"></div>
        <div class="home-greeting" id="home-greeting">Good morning, <span>GM Garu</span></div>
      </div>
      <div class="home-meta-col">
        <div class="home-sub">GCC AI &amp; Tech Intelligence</div>
        <div class="lr" id="lr"></div>
        <div class="hp-date-row">
          <label class="hp-date-label" for="hp-date-input">📅</label>
          <input type="date" id="hp-date-input" class="hp-date-input" onchange="hpPickDate(this.value)" title="Browse history"/>
        </div>
      </div>
    </div>
    <div id="hp-history-banner" class="hp-history-banner" style="display:none">
      <span id="hp-banner-text"></span>
      <button class="hp-today-btn" onclick="hpResetToday()">↩ Today</button>
    </div>
    <div class="sec-chips-row" id="sec-chips-row" style="animation:fadeIn .5s ease both;animation-delay:.1s"></div>
    <div class="home-grid" id="home-grid"></div>
  </div>

  <div id="sview">
    <div class="sec-header">
      <div class="sec-header-top">
        <img id="sec-icon" class="sec-header-icon" src="" alt="" style="display:none"/>
        <div>
          <div class="sec-header-ey" id="sec-ey"></div>
          <div class="sec-header-title" id="sec-title"></div>
        </div>
      </div>
    </div>
    <div id="cards"></div>
  </div>

  <div id="mgview">
    <div class="sec-header">
      <div class="sec-header-ey">Archive</div>
      <div class="sec-header-title">Past Editions</div>
    </div>
    <div class="mg-controls">
      <div class="mg-nav-row">
        <button class="mg-arrow" onclick="mgShiftDay(-1)">&#8249;</button>
        <span class="mg-date-label" id="mg-date-label">Today</span>
        <button class="mg-arrow" onclick="mgShiftDay(1)" id="mg-next-btn">&#8250;</button>
      </div>
      <input type="date" class="mg-date-input" id="mg-date-input" onchange="mgPickDate(this.value)">
      <button class="mg-btn" id="mg-week-btn" onclick="mgToggleWeek()">This Week</button>
    </div>
    <div class="mg-section-filter" id="mg-sec-filter"></div>
    <div id="mg-content"></div>
  </div>
</div>

<!-- Bottom tab navigation -->
<nav class="tab-bar" id="tab-bar">
  <button class="tab-item active" id="tab-home" onclick="tabNav('home')">
    <span class="tab-icon-svg">⌂</span><span class="tab-lbl">Home</span>
  </button>
  <button class="tab-item" id="tab-saved" onclick="tabNav('saved')">
    <span class="tab-icon-svg">★</span><span class="tab-lbl" id="tab-saved-lbl">Saved</span>
  </button>
  <button class="tab-item" id="tab-archive" onclick="tabNav('archive')">
    <span class="tab-icon-svg">◫</span><span class="tab-lbl">Archive</span>
  </button>
</nav>

<!-- TTS floating player -->
<div class="tts-bar" id="tts-bar">
  <span class="tts-wave">🔊</span>
  <div class="tts-info">
    <span class="tts-badge">Now Reading</span>
    <span class="tts-now" id="tts-now">—</span>
  </div>
  <div class="tts-controls">
    <select class="tts-speed-sel" id="tts-speed">
      <option value="0.8">0.8×</option>
      <option value="1" selected>1×</option>
      <option value="1.25">1.25×</option>
      <option value="1.5">1.5×</option>
    </select>
    <button class="tts-ctrl-btn tts-play-btn" id="tts-play-btn" onclick="ttsToggle()" title="Play/Pause">▶</button>
    <button class="tts-ctrl-btn" onclick="ttsStop()" title="Stop">⏹</button>
  </div>
</div>

<div class="confirm-overlay" id="confirm-overlay" onclick="if(event.target===this)confirmClose()">
  <div class="confirm-box">
    <h3 id="confirm-title"></h3>
    <p id="confirm-msg"></p>
    <div class="confirm-actions">
      <button class="confirm-cancel" onclick="confirmClose()">Cancel</button>
      <button class="confirm-ok" id="confirm-ok-btn" onclick="confirmProceed()">Confirm</button>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>

  btn.title = on ? 'Notifications ON — click to disable' : 'Enable push notifications';
}
async function setupPush() {
  if (!('serviceWorker' in navigator) || !('PushManager' in window)) return;
  try {
    _swReg = await navigator.serviceWorker.register('/sw.js');
    const existing = await _swReg.pushManager.getSubscription();
    _setNotifUI(!!existing);
  } catch {}
}
async function toggleNotifications() {
  if (!('serviceWorker' in navigator) || !('PushManager' in window)) {
    toast('Push notifications not supported in this browser'); return;
  }
  if (Notification.permission === 'denied') {
    toast('Notifications blocked — please allow them in browser settings'); return;
  }
  try {
    if (!_swReg) _swReg = await navigator.serviceWorker.register('/sw.js');
    // Wait for SW to be ready before using pushManager
    await navigator.serviceWorker.ready;
    const existing = await _swReg.pushManager.getSubscription();
    if (existing) {
      // ── TURN OFF ──────────────────────────────────────────────────────────
      await existing.unsubscribe();
      fetch('/api/unsubscribe',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({endpoint:existing.endpoint})}).catch(()=>{});
      _setNotifUI(false);
      toast('🔕 Notifications disabled');
    } else {
      // ── TURN ON ───────────────────────────────────────────────────────────
      const perm = await Notification.requestPermission();
      if (perm !== 'granted') { toast('Permission denied — check browser settings'); return; }
      let keyData;
      try { keyData = await (await fetch('/api/vapidkey')).json(); }
      catch { toast('Could not reach server for push key'); return; }
      const sub = await _swReg.pushManager.subscribe({
        userVisibleOnly: true,
        applicationServerKey: urlB64ToUint8(keyData.key),
      });
      await fetch('/api/subscribe',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({subscription:sub.toJSON()})});
      _setNotifUI(true);
      toast('🔔 Notifications enabled — you will get alerts per section');
      // Test notification directly via service worker (no server round-trip needed)
      setTimeout(async () => {
        try {
          const reg = await navigator.serviceWorker.ready;
          await reg.showNotification('GCC Intel — Notifications Active', {
            body: 'Daily brief alerts are on. You will be notified at 11 AM IST.',
            icon: '/gmr-favicon.png',
            tag: 'gccintel-test',
            renotify: true,
            data: { url: '/' },
          });
        } catch(e) { console.warn('Test notif failed:', e.message); }
      }, 800);
    }
  } catch(e) { toast('Notification error: '+e.message); console.error(e); }
}

// ── Formatting ────────────────────────────────────────────────────────────────
function fmtDate(d) {
  const D=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'], M=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return `${D[d.getDay()]}, ${String(d.getDate()).padStart(2,'0')} ${M[d.getMonth()]} ${d.getFullYear()}`;
}
function fmtAge(str) {
  if (!str) return '';
  const mon=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return str.replace(/(\d{4})-(\d{2})-(\d{2})(?:T[^"'\s·]*)*/g,(_,y,m,d)=>`${d} ${mon[+m-1]} ${y}`);
}
function isRecentArticle(item) {
  if (!item?.age) return true;
  const m = fmtAge(item.age).match(/(\d{1,2})\s+(\w{3})\s+(\d{4})/);
  if (!m) return true;
  const M={Jan:0,Feb:1,Mar:2,Apr:3,May:4,Jun:5,Jul:6,Aug:7,Sep:8,Oct:9,Nov:10,Dec:11};
  const d = new Date(+m[3], M[m[2]]??-1, +m[1]);
  if (isNaN(d)) return true;
  const now=new Date(), cut=new Date(now.getFullYear(),now.getMonth(),now.getDate()-7);
  return d>=cut && d<=now;
}

let _searchTimer;
function handleSearch(q) {
  clearTimeout(_searchTimer);
  if (!q.trim()) { if (active === '__search__') goHome(); return; }
  _searchTimer = setTimeout(() => {
    const query = q.trim().toLowerCase();
    const results = [];
    for (const sec of SECS) {
      for (const item of (cache[sec.id]||[])) {
        if ((item.title+' '+item.body+' '+(item.src||'')).toLowerCase().includes(query)) {
          results.push({...item, _sec: sec.id});
        }
      }
    }
    active = '__search__';
    ['hview','sview','mgview'].forEach(v=>document.getElementById(v).style.display='none');
    document.getElementById('back-btn').classList.add('visible');
    document.getElementById('sview').style.display='block';

    if (!results.length) {

    } else {

function itemKey(title) {

}

async function toggleSave(key,evt) {
  if(evt) evt.stopPropagation();
  const item=itemMap[key]; if(!item) return;
  const was=savedTitles.has(item.title);
  was?savedTitles.delete(item.title):savedTitles.add(item.title);
  document.querySelectorAll(`.save-btn[data-key="${key}"]`).forEach(b=>{b.classList.toggle('saved',!was);b.textContent=was?'☆':'★';});
  updateSavedCount();
  try {
    await fetch('/api/save',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({title:item.title,item,action:was?'unsave':'save'})});
    if(!was){if(!cache.saved)cache.saved=[];cache.saved=[item,...cache.saved.filter(i=>i.title!==item.title)];}
    else{if(cache.saved)cache.saved=cache.saved.filter(i=>i.title!==item.title);if(active==='saved')renderCards('saved');}
    toast(was?'Removed from saved':'Saved ✓');
  } catch {
    was?savedTitles.add(item.title):savedTitles.delete(item.title);
    document.querySelectorAll(`.save-btn[data-key="${key}"]`).forEach(b=>{b.classList.toggle('saved',was);b.textContent=was?'★':'☆';});
    updateSavedCount();
  }

// ── Manual refresh via SSE ────────────────────────────────────────────────────
let _es = null;
function startRefresh() {
  if (_es) { toast('Refresh already in progress…'); return; }
  const btn = document.getElementById('refresh-btn');
  const homeBtn = document.getElementById('home-refresh-btn');
  ppInit();
  ppShow();
  ppSetStatus('Connecting…');
  ppSetBar(0);
  if (btn) { btn.disabled = true; btn.textContent = '↻ Refreshing…'; }
  if (homeBtn) { homeBtn.disabled = true; homeBtn.textContent = '↻ Refreshing…'; }

  _es = new EventSource('/api/refresh-stream');
  const total = SECS.length;
  let done = 0;

  _es.onmessage = async e => {
    let ev; try { ev = JSON.parse(e.data); } catch { return; }
    if (ev.type === 'start') {
      const name = SECS.find(s => s.id === ev.section)?.name || ev.section;
      ppSetStatus(`Fetching ${ev.index + 1} / ${ev.total}: ${name}`);
      ppRowState(ev.section, 'active');
    } else if (ev.type === 'done') {
      done++;
      ppSetBar((done / total) * 100);
      ppRowState(ev.section, 'done', ev.count);
      if (Array.isArray(ev.items) && ev.items.length) cache[ev.section] = ev.items;
      _renderHome();
    } else if (ev.type === 'fail') {
      ppRowState(ev.section, 'fail');
    } else if (ev.type === 'wait') {
      ppSetStatus(`Pausing ${(ev.ms / 1000).toFixed(0)}s before next section…`);
    } else if (ev.type === 'complete') {
      ppSetBar(100);
      ppSetStatus(`Done — ${ev.succeeded} sections refreshed`);
      _es.close(); _es = null;
      if (btn) { btn.disabled = false; btn.textContent = '↻ Refresh Now'; }
      if (homeBtn) { homeBtn.disabled = false; homeBtn.textContent = '↻ Refresh'; }
      // Reload full weekly-agg into cache
      try {
        const r = await fetch('/api/weekly-agg');
        if (r.ok) {
          const data = await r.json();
          Object.entries(data.sections || {}).forEach(([sec, items]) => {
            if (Array.isArray(items) && items.length) cache[sec] = items;
          });
        }
      } catch {}
      _renderHome();
      if (active && active !== 'saved' && active !== 'manage') renderCards(active);
      // Update last-refreshed label
      try {
        const sr = await fetch('/api/settings');
        if (sr.ok) {
          const s = await sr.json();
          if (s.last_refresh) {
            const lr = new Date(s.last_refresh), el = document.getElementById('lr');
            if (el) el.textContent = 'Last refreshed: ' + lr.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' }) + ' · ' + fmtDate(lr);
          }
        }
      } catch {}
      // Reload archive view if open
      if (active === 'manage') { mgWeekMode ? mgLoadWeek() : mgLoadDay(mgDate); }
      setTimeout(ppHide, 3000);
    } else if (ev.type === 'error') {
      ppSetStatus('Error: ' + (ev.message || 'unknown'));
      _es.close(); _es = null;
      if (btn) { btn.disabled = false; btn.textContent = '↻ Refresh Now'; }
      if (homeBtn) { homeBtn.disabled = false; homeBtn.textContent = '↻ Refresh'; }
      setTimeout(ppHide, 4000);
    }
  };

  _es.onerror = () => {
    ppSetStatus('Connection lost — check server');
    _es.close(); _es = null;
    if (btn) { btn.disabled = false; btn.textContent = '↻ Refresh Now'; }
    if (homeBtn) { homeBtn.disabled = false; homeBtn.textContent = '↻ Refresh'; }
    setTimeout(ppHide, 4000);
  };
}

// ── HOME HISTORY PICKER ────────────────────────────────────────────────────────
let _newsJsonSections = {}; // keep a copy of news.json data to restore "today"

async function hpPickDate(val) {
  if (!val) return;
  const todayStr = new Date().toISOString().split('T')[0];
  if (val >= todayStr) {
    // Selected today or future — reset to news.json
    hpResetToday();
    document.getElementById('hp-date-input').value = '';
    return;
  }
  // Load history for selected date
  try {
    const r = await fetch('/api/history?date=' + val);
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const data = await r.json();
    const sections = data.sections || {};
    const hasData = Object.values(sections).some(a => a && a.length);
    if (!hasData) {
      showToast('No data found for ' + new Date(val+'T12:00:00').toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'}));
      document.getElementById('hp-date-input').value = '';
      return;
    }
    // Save news.json snapshot on first browse
    if (!Object.keys(_newsJsonSections).length) {
      _newsJsonSections = {};
      for (const k of Object.keys(cache)) { if (k !== 'saved') _newsJsonSections[k] = cache[k]; }
    }
    // Load history into cache
    const keys = ['exec','themes','competitor','talent','policy','tech','deals','risks'];
    keys.forEach(sec => { if (sections[sec]) cache[sec] = sections[sec]; else cache[sec] = []; });
    _renderHome();
    const label = new Date(val+'T12:00:00').toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
    document.getElementById('hp-banner-text').textContent = '📅 Viewing archive: ' + label;
    document.getElementById('hp-history-banner').style.display = 'flex';
  } catch(e) {
    showToast('Could not load history: ' + e.message);
    document.getElementById('hp-date-input').value = '';
  }
}

async function hpResetToday() {
  document.getElementById('hp-date-input').value = '';
  document.getElementById('hp-history-banner').style.display = 'none';
  // Restore from saved news.json snapshot if available
  if (Object.keys(_newsJsonSections).length) {
    for (const k of Object.keys(_newsJsonSections)) cache[k] = _newsJsonSections[k];
  } else {
    // Re-fetch news.json
    try {
      const r = await fetch('/news.json');
      if(r.ok){
        const data = await r.json();
        if(data.sections) Object.entries(data.sections).forEach(([sec,items])=>{
          if(Array.isArray(items)&&items.length>0) cache[sec]=items;
        });
      }
    } catch {}
  }
  _renderHome();
}

// ── MANAGE DATA ────────────────────────────────────────────────────────────────
let mgDate=new Date().toISOString().split('T')[0], mgWeekMode=false, mgActiveFilter='all';
function mgInit(){document.getElementById('mg-date-input').value=mgDate;mgBuildFilter();}
function mgBuildFilter(){
  document.getElementById('mg-sec-filter').innerHTML=
    [{id:'all',name:'All'}].concat(SECS.map(s=>({id:s.id,name:s.name}))).map(f=>
      `<button class="mg-filter-chip${mgActiveFilter===f.id?' active':''}" onclick="mgSetFilter('${f.id}')">${f.name}</button>`
    ).join('');
}
function mgSetFilter(id){mgActiveFilter=id;mgBuildFilter();mgWeekMode?mgLoadWeek():mgLoadDay(mgDate);}
function mgShiftDay(d){const dt=new Date(mgDate);dt.setDate(dt.getDate()+d);const s=dt.toISOString().split('T')[0];if(s>new Date().toISOString().split('T')[0])return;mgPickDate(s);}
function mgPickDate(val){mgDate=val;mgWeekMode=false;document.getElementById('mg-date-input').value=val;document.getElementById('mg-week-btn').classList.remove('active');mgLoadDay(val);}
function mgToggleWeek(){mgWeekMode=!mgWeekMode;document.getElementById('mg-week-btn').classList.toggle('active',mgWeekMode);mgWeekMode?mgLoadWeek():mgLoadDay(mgDate);}
async function mgLoadDay(date){
  document.getElementById('mg-content').innerHTML=skelHTML();
  const today=new Date().toISOString().split('T')[0];
  document.getElementById('mg-date-label').textContent=(date===today?'Today · ':'')+new Date(date+'T12:00:00').toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'short',year:'numeric'});
  document.getElementById('mg-next-btn').disabled=date>=today;
  try{const r=await fetch('/api/history?date='+date);mgRenderDay((await r.json()).sections||{});}
  catch{document.getElementById('mg-content').innerHTML='<div style="padding:28px;text-align:center;font-size:12px;color:var(--text3)">Failed to load</div>';}
}
async function mgLoadWeek(){
  document.getElementById('mg-content').innerHTML=skelHTML();
  document.getElementById('mg-date-label').textContent='This Week (Mon – Fri)';
  try{const r=await fetch('/api/weekly');mgRenderWeek(await r.json());}
  catch{document.getElementById('mg-content').innerHTML='<div style="padding:28px;text-align:center;font-size:12px;color:var(--text3)">Failed to load</div>';}
}
function mgRenderDay(sections){
  const order=mgActiveFilter==='all'?SECS.map(s=>s.id):[mgActiveFilter];
  let html='',total=0;
  for(const sid of order){const items=sections[sid]||[];if(!items.length)continue;total+=items.length;const sec=SECS.find(s=>s.id===sid)||{name:sid,ic:'var(--text3)'};html+=`<div class="mg-sec-label" style="color:${sec.ic}">${sec.name}</div><div class="cards-2col">${items.map(i=>cH(i,sid)).join('')}</div>`;}
  document.getElementById('mg-content').innerHTML=total?html:`<div class="empty-state"><div class="ei">◫</div><div class="em">No data for this date</div><div class="eh">Check back later for updated news</div></div>`;
}
function mgRenderWeek(data){
  const today=new Date().toISOString().split('T')[0],dayMap={};
  (data.days||[]).forEach(d=>{dayMap[d.date]=d;});
  const start=new Date((data.start||today)+'T12:00:00');
  let gridH=`<div class="weekly-summary"><div class="ws-title">This Week</div><div class="ws-sub">${data.start||''} → ${data.end||''}</div><div class="ws-grid">`;
  for(let i=0;i<5;i++){
    const d=new Date(start);d.setDate(start.getDate()+i);const ds=d.toISOString().split('T')[0];
    const dd=dayMap[ds],total=dd?Object.values(dd.sections).reduce((s,a)=>s+a.length,0):0,future=ds>today;
    gridH+=`<div class="ws-day${ds===today?' today':''}" onclick="${future?'':` mgPickDate('${ds}');mgWeekMode=false;document.getElementById('mg-week-btn').classList.remove('active')`}">
      <div class="ws-day-name">${d.toLocaleDateString('en-GB',{weekday:'short'})}</div>
      <div class="ws-day-date">${d.toLocaleDateString('en-GB',{day:'numeric',month:'short'})}</div>
      <div class="ws-day-count">${future?'—':total?total+' items':'No data'}</div>
    </div>`;
  }
  gridH+='</div></div>';
  const order=mgActiveFilter==='all'?SECS.map(s=>s.id):[mgActiveFilter];
  let blocks='';
  for(const dd of (data.days||[])){
    const total=order.reduce((s,sid)=>s+(dd.sections[sid]||[]).length,0);if(!total)continue;
    const label=dd.date===today?'Today':new Date(dd.date+'T12:00:00').toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'short'});
    blocks+=`<div class="day-block" id="db-${dd.date}">
      <div class="day-header" onclick="mgToggleBlock('${dd.date}')">
        <div style="display:flex;align-items:center"><span class="day-date">${label}</span><span class="day-count">${total} items</span></div>
        <span class="day-chevron">▾</span>
      </div>
      <div class="day-cards">${order.flatMap(sid=>{const items=dd.sections[sid]||[];if(!items.length)return[];const sec=SECS.find(s=>s.id===sid)||{name:sid,ic:'var(--text3)'};return[`<div class="mg-sec-label" style="color:${sec.ic}">${sec.name}</div><div class="cards-2col">${items.map(i=>cH(i,sid)).join('')}</div>`];}).join('')}</div>
    </div>`;
  }
  document.getElementById('mg-content').innerHTML=gridH+(blocks||`<div class="empty-state"><div class="ei">◫</div><div class="em">No history this week</div></div>`);
}
function mgToggleBlock(date){document.getElementById('db-'+date)?.classList.toggle('collapsed');}

document.addEventListener('keydown',e=>{
  if(e.key==='Escape'&&active) goHome();
  if(e.key===' '&&document.activeElement.tagName!=='INPUT'&&document.activeElement.tagName!=='TEXTAREA'){
    const bar=document.getElementById('tts-bar');
    if(bar&&bar.classList.contains('visible')){e.preventDefault();ttsToggle();}
  }
});

// ── Text-to-Speech ─────────────────────────────────────────────────────────────
let _ttsKey=null;
function _ttsStrip(h){return(h||'').replace(/<[^>]+>/g,' ').replace(/&amp;/g,'&').replace(/&lt;/g,'<').replace(/&gt;/g,'>').replace(/\s+/g,' ').trim();}
function ttsSpeak(key){
  if(!('speechSynthesis' in window)){toast('Text-to-speech not supported');return;}
  const item=itemMap[key];if(!item)return;
  window.speechSynthesis.cancel();
  document.querySelectorAll('.listen-btn.active').forEach(b=>b.classList.remove('active'));
  _ttsKey=key;
  const u=new SpeechSynthesisUtterance(
    [_ttsStrip(item.title)+'.', _ttsStrip(item.body), _ttsStrip(item.why)?'Strategic implication. '+_ttsStrip(item.why):'', item.src?'Source: '+item.src+'.':''].filter(Boolean).join(' ')
  );
  u.rate=parseFloat(document.getElementById('tts-speed')?.value||1);
  u.lang='en-IN';
  u.onstart=()=>{
    document.getElementById('tts-bar').classList.add('visible');
    document.getElementById('tts-now').textContent=item.title;
    document.getElementById('tts-play-btn').textContent='⏸';
    document.querySelectorAll(`.listen-btn[data-key="${key}"]`).forEach(b=>b.classList.add('active'));
  };
  u.onend=u.onerror=()=>_ttsDone();
  window.speechSynthesis.speak(u);
}
function _ttsDone(){
  _ttsKey=null;
  document.querySelectorAll('.listen-btn.active').forEach(b=>b.classList.remove('active'));
  document.getElementById('tts-play-btn').textContent='▶';
  document.getElementById('tts-bar').classList.remove('visible');
}
function ttsToggle(){
  const ss=window.speechSynthesis;
  if(!_ttsKey)return;
  if(ss.paused){ss.resume();document.getElementById('tts-play-btn').textContent='⏸';}
  else if(ss.speaking){ss.pause();document.getElementById('tts-play-btn').textContent='▶';}
}
function ttsStop(){window.speechSynthesis.cancel();_ttsDone();}
document.addEventListener('change',e=>{if(e.target.id==='tts-speed'&&_ttsKey)ttsSpeak(_ttsKey);});

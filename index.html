<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#080d1a" id="theme-meta">
<meta name="description" content="GCC AI & Tech Intelligence Brief">
<title>Daily Brief</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
<style>
:root,[data-theme="dark"]{
  --bg:#08090f;--bg2:#0d0e1a;--surface:#111528;--surface2:#161929;--surface3:#1c2035;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);--border3:rgba(255,255,255,0.22);
  --text:#e8e3d5;--text2:#8e8eab;--text3:#4a4a6e;
  --accent:#4f8ef7;--accent2:#6366f1;
  --gold:#c9a84c;--green:#10b981;--amber:#c9a84c;--red:#ef4444;--teal:#4db6ac;--purple:#8b5cf6;
  --serif:'Playfair Display',Georgia,serif;--sans:'DM Sans',system-ui,sans-serif;
  --r:12px;--rl:16px;--sw:260px;
  --save-idle:#4a4a6e;--save-on:#c9a84c;
}
[data-theme="light"]{
  --bg:#f0f4ff;--bg2:#ffffff;--surface:#f8faff;--surface2:#eef2ff;--surface3:#dde4f5;
  --border:rgba(0,0,0,0.07);--border2:rgba(0,0,0,0.12);--border3:rgba(0,0,0,0.22);
  --text:#0d1424;--text2:#3d5275;--text3:#8493b0;
  --accent:#2563eb;--accent2:#4f46e5;
  --green:#059669;--amber:#d97706;--red:#dc2626;--teal:#0d9488;--purple:#7c3aed;
  --save-idle:#94a3b8;--save-on:#d97706;
}
[data-theme="light"] .p-high{background:rgba(220,38,38,.12);color:#b91c1c}
[data-theme="light"] .p-med{background:rgba(217,119,6,.12);color:#92400e}
[data-theme="light"] .p-watch{background:rgba(124,58,237,.12);color:#5b21b6}
[data-theme="light"] .p-new{background:rgba(37,99,235,.12);color:#1e40af}
[data-theme="light"] .p-opp{background:rgba(5,150,105,.12);color:#065f46}
[data-theme="light"] .p-risk{background:rgba(220,38,38,.12);color:#b91c1c}
[data-theme="light"] .p-low{background:rgba(13,148,136,.12);color:#0f766e}
[data-theme="light"] .p-platform{background:rgba(99,102,241,.12);color:#4338ca}
[data-theme="light"] .p-scale{background:rgba(217,119,6,.12);color:#92400e}
[data-theme="light"] .p-expansion{background:rgba(5,150,105,.12);color:#065f46}
[data-theme="light"] .why{background:var(--surface2)}
[data-theme="light"] .ctag,[data-theme="light"] .chip{background:var(--surface2);border-color:var(--border2)}
[data-theme="light"] .csrc:hover{color:#1d4ed8}
[data-theme="light"] .mg-date-input{background:var(--surface);color:var(--text);border-color:var(--border2)}
[data-theme="light"] .day-header{background:var(--surface2)}
[data-theme="light"] .hc-preview{color:var(--text2)}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{height:100%;font-size:16px}
body{height:100%;font-family:var(--sans);background:var(--bg);color:var(--text);-webkit-tap-highlight-color:transparent;overflow:hidden;transition:background .2s,color .2s}
button{font-family:var(--sans);cursor:pointer}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-thumb{background:var(--surface3);border-radius:4px}

#app{display:block;height:100%}
.layout{display:flex;height:100%;overflow:hidden}

/* ── SIDEBAR ──────────────────────────── */
.sidebar{flex-shrink:0;width:var(--sw);background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.sb-brand{padding:22px 20px 16px;border-bottom:1px solid var(--border);flex-shrink:0}
.sb-brand-title{font-family:var(--serif);font-size:22px;color:var(--gold);font-weight:400;letter-spacing:.3px}
.sb-brand-sub{font-size:8px;text-transform:uppercase;letter-spacing:2.5px;color:var(--text3);margin-top:3px}
.sb-date-block{padding:12px 20px;border-bottom:1px solid var(--border);flex-shrink:0}
.sb-date-val{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:1.5px}
.sb-greet{font-style:italic;font-size:11px;color:var(--text2);margin-top:3px}
.sb-greet span{color:var(--text)}
.sb-section-label{font-size:8px;text-transform:uppercase;letter-spacing:2px;color:var(--text3);padding:14px 20px 4px;flex-shrink:0}
.sb-nav{flex:1;overflow-y:auto;padding:4px 0}
.sb-nav::-webkit-scrollbar{display:none}
.sb-tools{padding:4px 0;border-top:1px solid var(--border);flex-shrink:0}
.nav-item{display:flex;align-items:center;gap:10px;padding:8px 14px 8px 16px;cursor:pointer;border-left:2px solid transparent;background:transparent;border-top:none;border-right:none;border-bottom:none;width:100%;text-align:left;transition:background .12s,border-color .12s}
.nav-item:hover{background:var(--surface)}
.nav-item.active{background:var(--surface);border-left-color:var(--gold)}
.nav-item.saved-nav.active{border-left-color:var(--gold)}
.nav-item.manage-nav.active{border-left-color:var(--teal)}
.ni-roman{width:22px;height:22px;border-radius:4px;background:rgba(201,168,76,.08);display:flex;align-items:center;justify-content:center;font-size:9px;color:var(--gold);flex-shrink:0;font-family:var(--serif);letter-spacing:.3px}
.nav-item.active .ni-roman{background:rgba(201,168,76,.2)}
.ni-icon{display:none}
.ni-text{flex:1;overflow:hidden}
.ni-name{font-size:11px;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ni-count{font-size:10px;color:var(--text3);white-space:nowrap;overflow:hidden}
.sb-divider{height:1px;background:var(--border);margin:4px 14px}
.loading-txt{color:var(--accent);animation:bl 1s infinite}
@keyframes bl{0%,100%{opacity:1}50%{opacity:.3}}
.sb-foot{padding:12px 14px;border-top:1px solid var(--border);flex-shrink:0;display:flex;align-items:center;justify-content:space-between;gap:8px}
.live-pill{display:flex;align-items:center;gap:5px;font-size:10px;color:var(--green);background:rgba(16,185,129,.1);padding:3px 7px;border-radius:20px;white-space:nowrap}
.live-dot{width:5px;height:5px;border-radius:50%;background:var(--green);animation:bl 2s infinite;flex-shrink:0}
.refresh-btn{display:flex;align-items:center;gap:5px;padding:5px 10px;border-radius:var(--r);border:1px solid var(--border2);background:var(--surface);color:var(--text2);font-size:11px;transition:background .12s,color .12s;white-space:nowrap}
.refresh-btn:hover{background:var(--surface2);color:var(--text)}
.refresh-btn:disabled{opacity:.5;cursor:not-allowed}
.ri{display:inline-block;font-size:12px}
.spinning .ri{animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── THEME TOGGLE ─────────────────────── */
.theme-btn{display:flex;align-items:center;justify-content:center;width:30px;height:30px;border-radius:50%;border:1px solid var(--border2);background:var(--surface);color:var(--text2);font-size:14px;transition:background .12s;flex-shrink:0}
.theme-btn:hover{background:var(--surface2);color:var(--text)}

/* ── MAIN ─────────────────────────────── */
.main{flex:1;min-width:0;display:flex;flex-direction:column;overflow:hidden;background:var(--bg)}
.ch{flex-shrink:0;padding:18px 32px 16px;border-bottom:1px solid var(--border);background:var(--bg2)}
.ch-inner{max-width:900px}
.ch-top{display:flex;align-items:center;justify-content:space-between;gap:12px}
.ch-ey{font-size:9px;color:var(--teal);text-transform:uppercase;letter-spacing:2.5px;margin-bottom:6px}
.ch-ti{font-family:var(--serif);font-size:30px;color:var(--gold);line-height:1;letter-spacing:-.3px;font-weight:400}
.ch-right{display:flex;align-items:center;gap:8px;flex-shrink:0}
.auto-badge{font-size:9px;color:var(--teal);background:rgba(20,184,166,.1);padding:3px 7px;border-radius:20px;border:1px solid rgba(20,184,166,.2);white-space:nowrap}

/* ── HOME MAGAZINE ────────────────────── */
.home-wrap{flex:1;overflow-y:auto}
.home-body{padding:24px 28px 60px;max-width:1100px}
.hs-row{margin-bottom:32px}
.hs-hdr{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:16px}
.hs-title{font-size:17px;font-weight:600;color:var(--text);letter-spacing:-.2px}

/* Category scroll strip */
.cat-scroll{display:flex;gap:10px;overflow-x:auto;padding-bottom:6px;scrollbar-width:none}
.cat-scroll::-webkit-scrollbar{display:none}
.cat-card{flex-shrink:0;width:148px;background:var(--bg2);border:1px solid var(--border);border-radius:14px;overflow:hidden;cursor:pointer;transition:all .15s}
.cat-card:hover{border-color:var(--border2);transform:translateY(-2px);box-shadow:0 6px 18px rgba(0,0,0,.12)}
.cat-top-bar{height:3px}
.cat-inner{padding:11px 12px 12px}
.cat-name{font-size:11px;font-weight:600;color:var(--text);line-height:1.3;margin-bottom:5px}
.cat-pv{font-size:10px;color:var(--text3);line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;min-height:26px}
.cat-ct{font-size:9px;color:var(--text3);margin-top:7px;padding-top:6px;border-top:1px solid var(--border)}

/* Featured 3-col cards */
.feat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.feat-card{background:var(--bg2);border:1px solid var(--border);border-radius:16px;overflow:hidden;cursor:pointer;transition:all .15s}
.feat-card:hover{border-color:var(--gold);transform:translateY(-2px);box-shadow:0 8px 28px rgba(0,0,0,.2)}
.feat-banner{position:relative;height:150px;overflow:hidden;background:var(--surface)}
.feat-banner img{width:100%;height:100%;object-fit:cover;display:block;filter:brightness(.65);transition:filter .2s}
.feat-card:hover .feat-banner img{filter:brightness(.8)}
.feat-banner-overlay{position:absolute;bottom:0;left:0;right:0;padding:10px 12px;background:linear-gradient(transparent,rgba(0,0,0,.7))}
.feat-sec-tag{font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.7px;color:rgba(255,255,255,.9);background:rgba(0,0,0,.35);padding:3px 9px;border-radius:20px;white-space:nowrap}
.feat-body{padding:13px 14px 14px}
.feat-title{font-family:var(--serif);font-size:14px;color:var(--text);line-height:1.5;margin-bottom:10px;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;min-height:62px}
.feat-foot{display:flex;align-items:center;justify-content:space-between;gap:8px}
.feat-src{font-size:10px;font-weight:500;color:var(--accent);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.feat-age{font-size:9px;color:var(--text3);flex-shrink:0}

/* Briefing list */
.hl-list{border:1px solid var(--border);border-radius:var(--rl);overflow:hidden}
.hl-item{display:flex;align-items:center;gap:14px;padding:14px 16px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .12s}
.hl-item:last-child{border-bottom:none}
.hl-item:hover{background:var(--surface)}
.hl-img{width:60px;height:52px;border-radius:10px;object-fit:cover;flex-shrink:0}
.hl-img-fallback{width:60px;height:52px;border-radius:10px;flex-shrink:0}
.hl-body{flex:1;min-width:0}
.hl-sec-lbl{font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.9px;color:var(--text3);margin-bottom:3px}
.hl-title{font-family:var(--serif);font-size:13px;font-weight:400;color:var(--text);line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.hl-meta{display:flex;align-items:center;gap:6px;margin-top:4px}
.hl-source{font-size:10px;color:var(--accent);font-weight:500}
.hl-age-txt{font-size:10px;color:var(--text3)}
.hl-save{background:transparent;border:none;color:var(--text3);font-size:15px;padding:2px 4px;cursor:pointer;transition:color .12s;flex-shrink:0}
.hl-save:hover,.hl-save.saved{color:var(--gold)}

/* ── CARDS ────────────────────────────── */
.cards-area{flex:1;overflow-y:auto;padding:0}
.cards-inner{max-width:none}
.cards-area::-webkit-scrollbar{width:4px}
.cards-2col{display:grid;grid-template-columns:1fr 1fr}
.news-card{padding:24px 28px;border-bottom:1px solid var(--border);border-right:1px solid var(--border)}
.news-card:nth-child(even){border-right:none}
.news-card:last-child:nth-child(odd){grid-column:span 2}
.card-meta{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:10px}
.card-meta-left{display:flex;align-items:center;gap:0;flex-wrap:wrap;flex:1}
.pill{display:inline-flex;font-size:9px;font-weight:700;padding:2px 7px;border-radius:3px;flex-shrink:0;white-space:nowrap;letter-spacing:.5px;text-transform:uppercase;margin-right:8px}
.p-high{background:#c0392b;color:#fff}
.p-med{background:#b7860b;color:#fff}
.p-watch{background:#5b21b6;color:#fff}
.p-new{background:rgba(79,142,247,.25);color:#93c5fd}
.p-opp{background:rgba(16,185,129,.25);color:#6ee7b7}
.p-risk{background:#c0392b;color:#fff}
.p-low{background:rgba(20,184,166,.25);color:#5eead4}
.p-platform{background:rgba(99,102,241,.25);color:#a5b4fc}
.p-scale{background:#b7860b;color:#fff}
.p-expansion{background:rgba(16,185,129,.25);color:#6ee7b7}
.ctag{font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:1.2px;color:var(--text3)}
.cage{font-size:9px;color:var(--text3);white-space:nowrap;flex-shrink:0}
.ctitle{font-family:var(--serif);font-size:20px;font-weight:600;color:var(--text);line-height:1.35;margin-bottom:10px}
.cbody{font-size:13px;color:var(--text2);line-height:1.65;margin-bottom:14px}
.why{background:transparent;border:none;border-radius:0;padding:0;margin-bottom:14px;font-size:12px;color:var(--text2);line-height:1.55}
.why strong{display:block;font-size:9px;color:var(--teal);text-transform:uppercase;letter-spacing:2px;font-weight:600;font-family:var(--sans);margin-bottom:5px}
.cfoot{display:flex;align-items:center;justify-content:space-between;border-top:1px solid var(--border);padding-top:12px;margin-top:4px}
.csrc-name{font-size:10px;color:var(--text3)}
.cfoot-right{display:flex;align-items:center;gap:10px}
.read-src{font-size:11px;color:var(--accent);text-decoration:none;transition:color .12s}
.read-src:hover{color:var(--gold)}
.csrc{font-size:11px;color:var(--accent);transition:color .12s}
.csrc:hover{color:var(--gold);text-decoration:underline}
.fl{display:flex;align-items:center;gap:8px}
.save-btn{background:transparent;border:none;padding:2px 4px;border-radius:6px;font-size:15px;color:var(--save-idle);cursor:pointer;transition:color .15s,transform .1s;line-height:1;flex-shrink:0}
.save-btn:hover{color:var(--save-on);transform:scale(1.15)}
.save-btn.saved{color:var(--save-on)}
.divider{font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:2px;color:var(--text3);padding:18px 28px 10px;border-bottom:1px solid var(--border)}
.skel{padding:20px 0;border-bottom:1px solid var(--border)}
.sl{border-radius:6px;background:var(--surface2);animation:sh 1.5s infinite;margin-bottom:8px}
@keyframes sh{0%,100%{opacity:.3}50%{opacity:.7}}
.src-footer{margin-top:20px;padding-top:18px;border-top:1px solid var(--border)}
.src-lbl{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:10px}
.chips{display:flex;flex-wrap:wrap;gap:6px}
.chip{font-size:10px;color:var(--text3);background:var(--surface);border:1px solid var(--border);padding:3px 9px;border-radius:20px}
.lr{font-size:10px;color:var(--text3);margin-top:10px;font-style:italic}
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;text-align:center}
.empty-state .ei{font-size:36px;opacity:.2;margin-bottom:14px}
.empty-state .em{font-size:14px;color:var(--text2);margin-bottom:6px;font-weight:500}
.empty-state .eh{font-size:12px;color:var(--text3)}

/* ── MANAGE DATA ──────────────────────── */
.mg-wrap{flex:1;overflow-y:auto;padding:20px 28px 28px}
.mg-controls{display:flex;align-items:center;gap:10px;margin-bottom:20px;flex-wrap:wrap}
.mg-date-input{padding:6px 11px;border-radius:var(--r);border:1px solid var(--border2);background:var(--surface);color:var(--text);font-family:var(--sans);font-size:12px;outline:none}
.mg-date-input:focus{border-color:var(--accent)}
.mg-btn{padding:6px 12px;border-radius:var(--r);border:1px solid var(--border2);background:var(--surface);color:var(--text2);font-size:11px;font-family:var(--sans);transition:all .12s;white-space:nowrap}
.mg-btn:hover{background:var(--surface2);color:var(--text)}
.mg-btn.active{background:var(--accent);border-color:var(--accent);color:#fff}
.mg-nav-row{display:flex;align-items:center;gap:6px}
.mg-arrow{width:26px;height:26px;border-radius:7px;border:1px solid var(--border2);background:var(--surface);color:var(--text2);font-size:13px;display:flex;align-items:center;justify-content:center;transition:background .12s}
.mg-arrow:hover{background:var(--surface2);color:var(--text)}
.mg-date-label{font-size:12px;color:var(--text2);font-weight:500;min-width:130px;text-align:center}
.mg-section-filter{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:18px}
.mg-filter-chip{padding:3px 10px;border-radius:20px;border:1px solid var(--border2);background:transparent;color:var(--text3);font-size:10px;font-weight:500;font-family:var(--sans);transition:all .12s;cursor:pointer}
.mg-filter-chip:hover{background:var(--surface2);color:var(--text2)}
.mg-filter-chip.active{background:var(--accent);border-color:var(--accent);color:#fff}
.day-block{border:1px solid var(--border);border-radius:var(--rl);overflow:hidden;margin-bottom:14px}
.day-header{padding:11px 16px;background:var(--surface);display:flex;align-items:center;justify-content:space-between;cursor:pointer;user-select:none}
.day-date{font-size:13px;font-weight:600;color:var(--text)}
.day-count{font-size:10px;color:var(--text3);margin-left:10px}
.day-chevron{font-size:11px;color:var(--text3);transition:transform .2s}
.day-block.collapsed .day-chevron{transform:rotate(-90deg)}
.day-cards{padding:0 16px}
.day-block.collapsed .day-cards{display:none}
.mg-sec-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:1.2px;color:var(--text3);padding:14px 0 6px;border-bottom:1px solid var(--border)}
.weekly-summary{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);padding:16px;margin-bottom:20px}
.ws-title{font-family:var(--serif);font-size:17px;color:var(--text);margin-bottom:2px}
.ws-sub{font-size:11px;color:var(--text3);margin-bottom:14px}
.ws-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px}
.ws-day{border:1px solid var(--border);border-radius:var(--r);padding:10px 8px;cursor:pointer;transition:background .12s,border-color .12s;text-align:center}
.ws-day:hover{background:var(--surface2);border-color:var(--border2)}
.ws-day.today{border-color:var(--accent)}
.ws-day-name{font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.8px;color:var(--text3);margin-bottom:3px}
.ws-day-date{font-size:11px;color:var(--text2);margin-bottom:5px}
.ws-day-count{font-size:10px;color:var(--accent);font-weight:500}

/* ── TABLET 768–1199 ──────────────────── */
@media(max-width:1199px)and(min-width:768px){
  :root{--sw:60px}
  .sb-date,.ni-text,.refresh-btn span,.sb-divider{display:none}
  .sidebar{align-items:center}
  .sb-nav{width:100%;padding:6px 0}
  .nav-item{padding:9px;justify-content:center;border-left:none;border-right:2px solid transparent}
  .nav-item.active{border-left-color:transparent;border-right-color:var(--accent)}
  .nav-item.saved-nav.active{border-right-color:var(--amber)}
  .nav-item.manage-nav.active{border-right-color:var(--teal)}
  .sb-foot{flex-direction:column;padding:8px 6px;gap:6px}
  .live-pill span{display:none}
  .refresh-btn{width:34px;height:34px;padding:0;border-radius:50%;justify-content:center}
  .feat-grid{grid-template-columns:repeat(3,1fr)}
  .home-body{padding:16px 20px 20px}
  .ch{padding:14px 20px 12px}
  .mg-wrap{padding:16px 20px 20px}
  .cards-area{padding:6px 20px 20px}
  .ws-grid{grid-template-columns:repeat(3,1fr)}
}

/* ── LAPTOP 1400+ ─────────────────────── */
@media(min-width:1400px){
  :root{--sw:260px}
  .home-body{max-width:1200px}
  .feat-grid{grid-template-columns:repeat(3,1fr)}
}

/* ── MOBILE < 768 ─────────────────────── */
@media(max-width:767px){
  .sidebar{display:none}
  .layout{flex-direction:column}
  .main{height:100%;display:flex;flex-direction:column}

  /* Compact header */
  .ch{padding:env(safe-area-inset-top,44px) 16px 12px;flex-shrink:0}

  .hs-title{font-size:15px}

  .feat-grid{grid-template-columns:1fr 1fr}
  .feat-banner{height:70px}
  .feat-title{font-size:12px;min-height:50px}
  .hl-item{padding:12px 14px;gap:10px}

  /* Scroll areas */
  .cards-area{flex:1;overflow-y:auto;padding:6px 14px calc(70px + env(safe-area-inset-bottom,0px))}
  .mg-wrap{flex:1;overflow-y:auto;padding:12px 14px calc(70px + env(safe-area-inset-bottom,0px))}

  /* Cards */
  .news-card{padding:14px 0}
  .ctitle{font-size:14px}
  .cbody{font-size:12px;line-height:1.6}

  /* Manage */

  /* Bottom nav */

}

/* ── MOBILE BOTTOM NAV ────────────────── */
@media(min-width:768px){.mnav{display:none}.mob-refresh{display:none}}
.mnav{
  display:none;position:fixed;bottom:0;left:0;right:0;z-index:200;
  background:var(--bg2);border-top:1px solid var(--border);
  padding:6px 0 calc(6px + env(safe-area-inset-bottom,0px));
  overflow-x:auto;-webkit-overflow-scrolling:touch;
  scrollbar-width:none;
}
.mnav::-webkit-scrollbar{display:none}
.mni{
  display:flex;flex-direction:column;align-items:center;gap:2px;
  padding:5px 8px;border-radius:var(--r);cursor:pointer;flex-shrink:0;
  min-width:48px;background:transparent;border:none;color:var(--text3);
  transition:color .12s,background .12s;
}
.mni:hover,.mni.active{background:var(--surface);color:var(--text2)}
.mni.active{color:var(--accent)}
.mni.saved-mni.active{color:var(--amber)}
.mni.manage-mni.active{color:var(--teal)}
.mni-icon{display:none}
.mni-lbl{font-size:8px;white-space:nowrap;max-width:48px;overflow:hidden;text-overflow:ellipsis}
.mob-refresh{display:none;padding:5px 10px;border-radius:var(--r);border:1px solid var(--border2);background:var(--surface);color:var(--text2);font-size:11px}

/* ── TOAST ────────────────────────────── */
.toast{position:fixed;bottom:76px;left:50%;transform:translateX(-50%);background:var(--surface2);border:1px solid var(--border2);border-radius:24px;padding:9px 18px;font-size:12px;color:var(--text2);z-index:500;opacity:0;transition:opacity .25s;pointer-events:none;white-space:nowrap;max-width:calc(100vw - 28px);text-align:center}
.toast.show{opacity:1}
@media(min-width:768px){.toast{bottom:24px}}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.fu{animation:fadeUp .22s ease both}
</style>

<body>
<div id="app">

      </div>
      <div class="mg-section-filter" id="mg-sec-filter"></div>

    </div>
  </div>
</div>

<!-- MOBILE BOTTOM NAV -->
<nav class="mnav" id="mnav"></nav>
</div>

<div class="toast" id="toast"></div>

<script>
const API = '/api/refresh';
const SECS = [
  {id:'exec',      name:'Executive Snapshot',    short:'Exec',   ey:"Chairman's 60-Second Scan",      roman:'I',   ibg:'rgba(79,142,247,.18)',  ic:'#93c5fd'},
  {id:'themes',    name:'Strategic Themes',       short:'Themes', ey:'Patterns · Strategic Signals',   roman:'II',  ibg:'rgba(139,92,246,.18)',  ic:'#c4b5fd'},
  {id:'deals',     name:'Deals & Capital',        short:'Deals',  ey:'Ecosystem Clustering',           roman:'III', ibg:'rgba(16,185,129,.18)',  ic:'#6ee7b7'},
  {id:'risks',     name:'Risks & Opportunities',  short:'Risks',  ey:'CEO-Level Framing',              roman:'IV',  ibg:'rgba(245,158,11,.18)',  ic:'#fcd34d'},
  {id:'competitor',name:'Market Moves',           short:'Moves',  ey:'Who Moved and Why',              roman:'V',   ibg:'rgba(245,158,11,.18)',  ic:'#fcd34d'},
  {id:'talent',    name:'Talent Signals',         short:'Talent', ey:'Hiring · Salaries · Risk',       roman:'VI',  ibg:'rgba(20,184,166,.18)',  ic:'#5eead4'},
  {id:'policy',    name:'Policy & Regulation',    short:'Policy', ey:'Compliance · Act or Monitor',    roman:'VII', ibg:'rgba(239,68,68,.18)',   ic:'#fca5a5'},
  {id:'tech',      name:'Technology Signals',     short:'Tech',   ey:'GCC-Relevant Shifts Only',       roman:'VIII',ibg:'rgba(79,142,247,.18)',  ic:'#93c5fd'},
];

const cache = {}, loading = {};
let active = null;
const savedTitles = new Set();
const itemMap = {};

const FB = [{pill:'High',pc:'p-high',tag:'GCC · Today',age:'Today',title:'Tap Refresh to load today\'s live news',body:'Click Refresh to fetch the latest news via Claude\'s live web search. Each section pulls a real, verified article published today or within the last 3 days.',why:'<strong>Live data:</strong> Every URL is real — fetched directly from the web.',src:'Daily Brief',url:''}];

// ── Theme ─────────────────────────────────────────────────────────────────────
function toggleTheme() {
  const html = document.documentElement;
  const dark = html.getAttribute('data-theme') === 'dark';
  const next = dark ? 'light' : 'dark';
  html.setAttribute('data-theme', next);
  localStorage.setItem('gcc-theme', next);
  const icon = dark ? '🌙' : '☀';
  ['theme-toggle','theme-toggle-sb'].forEach(id => { const b = document.getElementById(id); if (b) b.textContent = icon; });
  document.getElementById('theme-meta').setAttribute('content', dark ? '#ffffff' : '#08090f');
}

// ── Toast ─────────────────────────────────────────────────────────────────────
let _tt;
function toast(m, d = 2800) {
  const t = document.getElementById('toast');
  t.textContent = m; t.classList.add('show');
  clearTimeout(_tt); _tt = setTimeout(() => t.classList.remove('show'), d);
}

// ── Item key ──────────────────────────────────────────────────────────────────
function itemKey(title) {
  let h = 0;
  for (let i = 0; i < title.length; i++) { h = ((h << 5) - h) + title.charCodeAt(i); h |= 0; }
  return 'k' + Math.abs(h);
}

// ── Saved ─────────────────────────────────────────────────────────────────────
function updateSavedCount() {
  const n = savedTitles.size;
  const el = document.getElementById('nc-saved'); if (el) el.textContent = n + ' saved';
  const ml = document.getElementById('mni-saved-lbl'); if (ml) ml.textContent = n ? `Saved (${n})` : 'Saved';
}

async function toggleSave(key, evt) {
  if (evt) evt.stopPropagation();
  const item = itemMap[key]; if (!item) return;
  const was = savedTitles.has(item.title);
  was ? savedTitles.delete(item.title) : savedTitles.add(item.title);
  document.querySelectorAll(`.save-btn[data-key="${key}"]`).forEach(b => {
    b.classList.toggle('saved', !was); b.textContent = was ? '☆' : '★';
  });
  updateSavedCount();
  try {
    await fetch('/api/save', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ title: item.title, item, action: was ? 'unsave' : 'save' }) });
    if (!was) { if (!cache.saved) cache.saved = []; cache.saved = [item, ...cache.saved.filter(i => i.title !== item.title)]; }
    else { if (cache.saved) cache.saved = cache.saved.filter(i => i.title !== item.title); if (active === 'saved') renderCards('saved'); }
    toast(was ? 'Removed from saved' : 'Saved ✓');
  } catch {
    was ? savedTitles.add(item.title) : savedTitles.delete(item.title);
    document.querySelectorAll(`.save-btn[data-key="${key}"]`).forEach(b => { b.classList.toggle('saved', was); b.textContent = was ? '★' : '☆'; });
    updateSavedCount();
  }
}

async function loadSaved() {
  try {
    const res = await fetch('/api/saved'); if (!res.ok) return;
    const items = await res.json();
    items.forEach(item => { savedTitles.add(item.title); itemMap[itemKey(item.title)] = item; });
    cache.saved = items; updateSavedCount();
  } catch {}
}

// ── Auto-refresh 4h ───────────────────────────────────────────────────────────
const REFRESH_MS = 4 * 60 * 60 * 1000;
let nextRefreshAt = null;

async function setupRefreshTimer() {
  try {
    const res = await fetch('/api/settings'); if (!res.ok) { scheduleFromNow(); return; }
    const s = await res.json();
    const last = s.last_refresh ? new Date(s.last_refresh) : null;
    if (last) {
      const age = Date.now() - last.getTime();
      // If still within the window, countdown to the natural expiry
      // If already stale, schedule a fresh cycle from now (no immediate call)
      nextRefreshAt = age < REFRESH_MS
        ? new Date(last.getTime() + REFRESH_MS)
        : new Date(Date.now() + REFRESH_MS);
    } else {
      scheduleFromNow();
      return;
    }
    startCountdown();
  } catch { scheduleFromNow(); }
}

function scheduleFromNow() {
  nextRefreshAt = new Date(Date.now() + REFRESH_MS);
  startCountdown();
}

function startCountdown() {
  const badge = document.getElementById('auto-badge');
  const cd = document.getElementById('ar-countdown');
  if (!nextRefreshAt) return;
  const tick = () => {
    const diff = nextRefreshAt - Date.now();
    if (diff <= 0) {
      if (badge) badge.style.display = 'none';
      // Timer fired — this is the only place refreshAll() is called
      toast('Auto-refreshing…', 6000);
      nextRefreshAt = new Date(Date.now() + REFRESH_MS);
      refreshAll().then(() => startCountdown());
      return;
    }
    const h = Math.floor(diff / 3600000), m = Math.floor((diff % 3600000) / 60000);
    if (cd) cd.textContent = h > 0 ? `${h}h ${m}m` : `${m}m`;
    if (badge) badge.style.display = '';
  };
  tick(); clearInterval(window._arTimer); window._arTimer = setInterval(tick, 30000);
}

// ── Init ──────────────────────────────────────────────────────────────────────
async function init() {
  const theme = localStorage.getItem('gcc-theme') || 'dark';
  document.documentElement.setAttribute('data-theme', theme);
  const icon = theme === 'dark' ? '☀' : '🌙';
  ['theme-toggle','theme-toggle-sb'].forEach(id => { const b = document.getElementById(id); if (b) b.textContent = icon; });
  document.getElementById('theme-meta').setAttribute('content', theme === 'dark' ? '#08090f' : '#ffffff');

  const d = new Date();
  const ds = d.toLocaleDateString('en-GB', {weekday:'long', day:'numeric', month:'long', year:'numeric'});
  const sbd = document.getElementById('sb-date'); if (sbd) sbd.textContent = ds;
  const h = d.getHours();
  const greet = h < 12 ? 'Good morning' : h < 17 ? 'Good afternoon' : 'Good evening';
  const sbg = document.getElementById('sb-greet'); if (sbg) sbg.innerHTML = `${greet}, <span>GM Rao, Sir</span>`;
  document.getElementById('ch-ey').textContent = SECS[0]?.ey || "Chairman's 60-Second Scan";

  try { const r = await fetch('/api/data'); if (r.ok) Object.assign(cache, await r.json()); } catch {}
  await loadSaved();
  buildSidebarNav(); buildMobileNav();
  _renderHome();
  Object.keys(cache).forEach(id => { if (id !== 'saved') setTile(id, 'done'); });
  setupRefreshTimer();
  mgInit();
}

// ── Sidebar nav ───────────────────────────────────────────────────────────────
function buildSidebarNav() {
  document.getElementById('sb-nav').innerHTML =
    SECS.map(s => `<button class="nav-item" id="ni-${s.id}" onclick="openSec('${s.id}')">
      <div class="ni-roman">${s.roman}</div>
      <div class="ni-text"><div class="ni-name">${s.name}</div><div class="ni-count" id="nc-${s.id}">—</div></div>
    </button>`).join('');
  document.getElementById('sb-tools').innerHTML =
    `<button class="nav-item saved-nav" id="ni-saved" onclick="openSec('saved')">
      <div class="ni-roman" style="color:var(--gold)">★</div>
      <div class="ni-text"><div class="ni-name">Saved</div><div class="ni-count" id="nc-saved">${savedTitles.size} saved</div></div>
    </button>
    <button class="nav-item manage-nav" id="ni-manage" onclick="openSec('manage')">
      <div class="ni-roman" style="color:var(--teal)">⊞</div>
      <div class="ni-text"><div class="ni-name">Archive</div><div class="ni-count">Past editions</div></div>
    </button>`;
}

// ── Mobile nav ────────────────────────────────────────────────────────────────
function buildMobileNav() {
  const saved = `<button class="mni saved-mni" id="mn-saved" onclick="openSec('saved')"><span class="mni-icon">★</span><span class="mni-lbl" id="mni-saved-lbl">Saved</span></button>`;
  const manage = `<button class="mni manage-mni" id="mn-manage" onclick="openSec('manage')"><span class="mni-icon">◫</span><span class="mni-lbl">Data</span></button>`;
  document.getElementById('mnav').innerHTML = saved + manage +
    SECS.map(s => `<button class="mni" id="mn-${s.id}" onclick="openSec('${s.id}')"><span class="mni-icon">${s.icon}</span><span class="mni-lbl">${s.short}</span></button>`).join('');
}

// ── Home magazine ─────────────────────────────────────────────────────────────
const GRADS = {
  exec:       'linear-gradient(135deg,#1e3a8a,#3b82f6)',
  themes:     'linear-gradient(135deg,#4c1d95,#8b5cf6)',
  competitor: 'linear-gradient(135deg,#92400e,#f59e0b)',
  talent:     'linear-gradient(135deg,#134e4a,#14b8a6)',
  policy:     'linear-gradient(135deg,#7f1d1d,#ef4444)',
  tech:       'linear-gradient(135deg,#1e40af,#60a5fa)',
  deals:      'linear-gradient(135deg,#064e3b,#10b981)',
  risks:      'linear-gradient(135deg,#78350f,#f59e0b)',
};

let _homeRenderPending = false;
function renderHomeGrid() {
  if (_homeRenderPending) return;
  _homeRenderPending = true;
  requestAnimationFrame(() => {
    _homeRenderPending = false;
    _renderHome();
  });
}

function _renderHome() {
  const catEl = document.getElementById('cat-scroll');
  const featEl = document.getElementById('feat-grid');
  const hlEl = document.getElementById('hl-list');
  if (!catEl) return;

  // Browse Categories (all 8)
  catEl.innerHTML = SECS.map(s => {
    const item = cache[s.id]?.[0];
    return `<div class="cat-card" onclick="openSec('${s.id}')">
      <div class="cat-top-bar" style="background:${GRADS[s.id]}"></div>
      <div class="cat-inner">
        <div class="cat-name">${s.name}</div>
        <div class="cat-pv" id="hcpv-${s.id}">${item ? item.title : '<span style="color:var(--text3)">—</span>'}</div>
        <div class="cat-ct" id="hcc-${s.id}">${item ? '1 article' : '—'}</div>
      </div>
    </div>`;
  }).join('');

  // Featured Stories (first 3: exec, themes, deals)
  featEl.innerHTML = SECS.slice(0,3).map(s => {
    const item = cache[s.id]?.[0];
    const imgSeed = s.id + '1';
    return `<div class="feat-card" onclick="openSec('${s.id}')">
      <div class="feat-banner">
        <img src="https://picsum.photos/seed/${imgSeed}/480/300" alt="" loading="lazy"
          onerror="this.style.display='none';this.parentElement.style.background='${GRADS[s.id]}'">
        <div class="feat-banner-overlay"><span class="feat-sec-tag">${s.name}</span></div>
      </div>
      <div class="feat-body">
        <div class="feat-title">${item ? item.title : '<span style="color:var(--text3);font-size:11px">Loading…</span>'}</div>
        <div class="feat-foot">
          <span class="feat-src">${item ? '↗ '+item.src : ''}</span>
          <span class="feat-age">${item ? item.age : ''}</span>
        </div>
      </div>
    </div>`;
  }).join('');

  // Today's Briefing (last 5: risks, competitor, talent, policy, tech)
  hlEl.innerHTML = SECS.slice(3).map(s => {
    const item = cache[s.id]?.[0];
    const key = item ? itemKey(item.title) : '';
    if (item) itemMap[key] = item;
    const saved = item && savedTitles.has(item.title);
    const imgSeed = s.id + '2';
    return `<div class="hl-item" onclick="openSec('${s.id}')">
      <img src="https://picsum.photos/seed/${imgSeed}/120/104" alt="" class="hl-img" loading="lazy"
        onerror="this.style.display='none'">
      <div class="hl-body">
        <div class="hl-sec-lbl">${s.name}</div>
        <div class="hl-title">${item ? item.title : '<span style="color:var(--text3)">Loading…</span>'}</div>
        <div class="hl-meta">${item ? `<span class="hl-source">↗ ${item.src}</span><span class="hl-age-txt">${item.age}</span>` : ''}</div>
      </div>
      ${item ? `<button class="hl-save${saved?' saved':''}" data-key="${key}" onclick="toggleSave('${key}',event)">${saved?'★':'☆'}</button>` : '<div style="width:22px"></div>'}
    </div>`;
  }).join('');
}

// ── Tile state ────────────────────────────────────────────────────────────────
function setTile(id, state) {
  const ncEl = document.getElementById('nc-' + id);
  const item = cache[id]?.[0];
  if (state === 'loading') {
    if (ncEl) ncEl.innerHTML = '<span class="loading-txt">Searching…</span>';
  } else if (state === 'done' && item) {
    if (ncEl) ncEl.textContent = '1 article · just now';
  } else if (state === 'error') {
    if (ncEl) ncEl.textContent = 'Error';
  }
  if (document.getElementById('hview').style.display !== 'none') renderHomeGrid();
}

// ── Open section ──────────────────────────────────────────────────────────────
function openSec(id) {
  active = id;
  const special = { saved: ['Saved Articles','Your saved articles'], manage: ['Manage Data','History · Weekly Summary'] };
  const [title, ey] = special[id] || [(SECS.find(x=>x.id===id)||{}).name||id, (SECS.find(x=>x.id===id)||{}).ey||''];
  document.getElementById('ch-ey').textContent = ey;
  document.getElementById('ch-ti').textContent = title;
  document.getElementById('hview').style.display = 'none';
  document.getElementById('sview').style.display = 'none';
  document.getElementById('mgview').style.display = 'none';
  if (id === 'manage') document.getElementById('mgview').style.display = 'block';
  else { document.getElementById('sview').style.display = 'block'; renderCards(id); }
  ['saved','manage'].forEach(x => {
    document.getElementById('ni-'+x)?.classList.toggle('active', x===id);
    document.getElementById('mn-'+x)?.classList.toggle('active', x===id);
  });
  SECS.forEach(x => {
    document.getElementById('ni-'+x.id)?.classList.toggle('active', x.id===id);
    document.getElementById('mn-'+x.id)?.classList.toggle('active', x.id===id);
    document.getElementById('hc-'+x.id)?.classList.toggle('active', x.id===id);
  });
}

// ── Render cards ──────────────────────────────────────────────────────────────
function renderCards(id) {
  const w = document.getElementById('cards');
  if (id === 'saved') {
    const items = cache.saved || [];
    w.innerHTML = items.length ? '<div>' + items.map(cH).join('') + '</div>'
      : `<div class="empty-state"><div class="ei">★</div><div class="em">No saved articles yet</div><div class="eh">Tap ☆ on any article to save it here</div></div>`;
    document.getElementById('sview').scrollTop = 0; return;
  }
  const items = cache[id] || (id === 'exec' ? FB : null);
  if ((loading[id] && !items) || !items) { w.innerHTML = skelHTML(); return; }
  let h = '';
  if (id === 'risks') {
    const r = items.filter(i => i.pill === 'Risk'), o = items.filter(i => i.pill === 'Opp');
    h = (r.length ? '<div class="divider">Risk</div><div class="cards-2col">' + r.map(cH).join('') + '</div>' : '') +
        (o.length ? '<div class="divider">Opportunity</div><div class="cards-2col">' + o.map(cH).join('') + '</div>' : '');
    if (!h) h = '<div class="cards-2col">' + items.map(cH).join('') + '</div>';
  } else {
    h = '<div class="cards-2col">' + items.map(cH).join('') + '</div>';
  }
  w.innerHTML = h;
  document.getElementById('sview').scrollTop = 0;
}

function cH(item) {
  const key = itemKey(item.title);
  itemMap[key] = item;
  const on = savedTitles.has(item.title);
  const srcLink = item.url
    ? `<a class="read-src" href="${item.url}" target="_blank" rel="noopener">↗ Read source</a>`
    : '';
  return `<div class="news-card">
  <div class="card-meta">
    <div class="card-meta-left">
      ${item.pill ? `<span class="pill ${item.pc||'p-new'}">${item.pill}</span>` : ''}
      <span class="ctag">${item.tag||''}</span>
    </div>
    <span class="cage">${item.age||''}</span>
  </div>
  <div class="ctitle">${item.title}</div>
  <div class="cbody">${item.body}</div>
  <div class="why">${item.why}</div>
  <div class="cfoot">
    <span class="csrc-name">${item.src||''}</span>
    <div class="cfoot-right">
      ${srcLink}
      <button class="save-btn${on?' saved':''}" data-key="${key}" onclick="toggleSave('${key}',event)" title="${on?'Remove':'Save'}">${on?'★':'☆'}</button>
    </div>
  </div>
</div>`;
}

function skelHTML() {
  return '<div>' + Array(2).fill(0).map(() => `
  <div class="skel">
    <div style="display:flex;gap:10px;margin-bottom:10px"><div class="sl" style="height:20px;width:60px;border-radius:20px"></div><div class="sl" style="height:20px;flex:1"></div></div>
    <div class="sl" style="height:12px;width:100%"></div><div class="sl" style="height:12px;width:80%"></div>
    <div class="sl" style="height:52px;width:100%;margin-top:12px;border-radius:10px"></div>
  </div>`).join('') + '</div>';
}

// ── Load section ──────────────────────────────────────────────────────────────
async function loadSection(id) {
  if (loading[id] || ['saved','manage'].includes(id)) return;
  loading[id] = true; setTile(id, 'loading');
  if (active === id) renderCards(id);
  try {
    const res = await fetch(API, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({section:id}) });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const d = await res.json();
    if (d.error) throw new Error(d.error);
    if (!Array.isArray(d.items)) throw new Error('Bad format');
    cache[id] = d.items; setTile(id, 'done');
    if (active === id) renderCards(id);
  } catch (e) {
    console.error(id, e.message); setTile(id, 'error');
    if (active === id && !cache[id] && id === 'exec') { cache[id] = FB; renderCards(id); }
    toast((SECS.find(s=>s.id===id)||{}).name + ': ' + e.message);
  } finally { loading[id] = false; }
}

// ── Refresh all ───────────────────────────────────────────────────────────────
async function refreshAll() {
  toast('Searching the web for today\'s news…', 8000);
  SECS.forEach(s => { delete cache[s.id]; delete loading[s.id]; });
  _renderHome();
  if (active && !['saved','manage'].includes(active)) renderCards(active);
  await Promise.allSettled(SECS.map(s => loadSection(s.id)));
  const now = new Date();
  const lrel = document.getElementById('lr');
  if (lrel) lrel.textContent = 'Last refreshed: ' + now.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'}) + ' · ' + now.toLocaleDateString('en-GB',{day:'numeric',month:'short'});
  toast('All sections updated ✓');
  if (active && !['saved','manage'].includes(active)) renderCards(active);
  nextRefreshAt = new Date(Date.now() + REFRESH_MS); startCountdown();
  const highItems = SECS.flatMap(s => (cache[s.id]||[]).filter(i => ['High','Act Now','Risk','Accelerating'].includes(i.pill)));
  if (highItems.length) fetch('/api/teams-notify', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({items:highItems}) }).catch(()=>{});
}

// ── MANAGE DATA ───────────────────────────────────────────────────────────────
let mgDate = new Date().toISOString().split('T')[0];
let mgWeekMode = false;
let mgActiveFilter = 'all';

function mgInit() {
  document.getElementById('mg-date-input').value = mgDate;
  mgBuildFilter();
}

function mgBuildFilter() {
  document.getElementById('mg-sec-filter').innerHTML =
    [{id:'all',name:'All'}].concat(SECS.map(s=>({id:s.id,name:s.name}))).map(f =>
      `<button class="mg-filter-chip${mgActiveFilter===f.id?' active':''}" onclick="mgSetFilter('${f.id}')">${f.name}</button>`
    ).join('');
}

function mgSetFilter(id) { mgActiveFilter = id; mgBuildFilter(); mgWeekMode ? mgLoadWeek() : mgLoadDay(mgDate); }
function mgShiftDay(d) {
  const dt = new Date(mgDate); dt.setDate(dt.getDate() + d);
  const s = dt.toISOString().split('T')[0];
  if (s > new Date().toISOString().split('T')[0]) return;
  mgPickDate(s);
}
function mgPickDate(val) {
  mgDate = val; mgWeekMode = false;
  document.getElementById('mg-date-input').value = val;
  document.getElementById('mg-week-btn').classList.remove('active');
  mgLoadDay(val);
}
function mgToggleWeek() {
  mgWeekMode = !mgWeekMode;
  document.getElementById('mg-week-btn').classList.toggle('active', mgWeekMode);
  mgWeekMode ? mgLoadWeek() : mgLoadDay(mgDate);
}

async function mgLoadDay(date) {
  document.getElementById('mg-content').innerHTML = skelHTML();
  const today = new Date().toISOString().split('T')[0];
  document.getElementById('mg-date-label').textContent = (date===today?'Today · ':'') + new Date(date+'T12:00:00').toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'short',year:'numeric'});
  document.getElementById('mg-next-btn').disabled = date >= today;
  try {
    const res = await fetch('/api/history?date='+date);
    mgRenderDay((await res.json()).sections||{});
  } catch { document.getElementById('mg-content').innerHTML = '<div style="padding:28px;text-align:center;font-size:12px;color:var(--text3)">Failed to load</div>'; }
}

async function mgLoadWeek() {
  document.getElementById('mg-content').innerHTML = skelHTML();
  document.getElementById('mg-date-label').textContent = 'This Week (Mon – Fri)';
  try {
    const res = await fetch('/api/weekly');
    mgRenderWeek(await res.json());
  } catch { document.getElementById('mg-content').innerHTML = '<div style="padding:28px;text-align:center;font-size:12px;color:var(--text3)">Failed to load</div>'; }
}

function mgRenderDay(sections) {
  const order = mgActiveFilter === 'all' ? SECS.map(s=>s.id) : [mgActiveFilter];
  let html = '', total = 0;
  for (const sid of order) {
    const items = sections[sid]||[]; if (!items.length) continue; total += items.length;
    const sec = SECS.find(s=>s.id===sid)||{name:sid,ic:'var(--text3)'};
    html += `<div class="mg-sec-label" style="color:${sec.ic}">${sec.name}</div><div>${items.map(cH).join('')}</div>`;
  }
  document.getElementById('mg-content').innerHTML = total ? html
    : `<div class="empty-state"><div class="ei">◫</div><div class="em">No data for this date</div><div class="eh">Refresh loads today's news into history</div></div>`;
}

function mgRenderWeek(data) {
  const today = new Date().toISOString().split('T')[0];
  const dayMap = {}; (data.days||[]).forEach(d => { dayMap[d.date] = d; });
  const start = new Date((data.start||today)+'T12:00:00');
  let gridH = `<div class="weekly-summary"><div class="ws-title">This Week</div><div class="ws-sub">${data.start||''} → ${data.end||''}</div><div class="ws-grid">`;
  for (let i = 0; i < 5; i++) {
    const d = new Date(start); d.setDate(start.getDate()+i);
    const ds = d.toISOString().split('T')[0];
    const dd = dayMap[ds], total = dd ? Object.values(dd.sections).reduce((s,a)=>s+a.length,0):0;
    const future = ds > today;
    gridH += `<div class="ws-day${ds===today?' today':''}" onclick="${future?'':` mgPickDate('${ds}');mgWeekMode=false;document.getElementById('mg-week-btn').classList.remove('active')`}">
      <div class="ws-day-name">${d.toLocaleDateString('en-GB',{weekday:'short'})}</div>
      <div class="ws-day-date">${d.toLocaleDateString('en-GB',{day:'numeric',month:'short'})}</div>
      <div class="ws-day-count">${future?'—':total?total+' items':'No data'}</div>
    </div>`;
  }
  gridH += '</div></div>';
  const order = mgActiveFilter === 'all' ? SECS.map(s=>s.id) : [mgActiveFilter];
  let blocks = '';
  for (const dd of (data.days||[])) {
    const total = order.reduce((s,sid)=>s+(dd.sections[sid]||[]).length,0); if (!total) continue;
    const label = dd.date===today ? 'Today' : new Date(dd.date+'T12:00:00').toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'short'});
    blocks += `<div class="day-block" id="db-${dd.date}">
      <div class="day-header" onclick="mgToggleBlock('${dd.date}')">
        <div style="display:flex;align-items:center"><span class="day-date">${label}</span><span class="day-count">${total} items</span></div>
        <span class="day-chevron">▾</span>
      </div>
      <div class="day-cards">${order.flatMap(sid=>{const items=dd.sections[sid]||[];if(!items.length)return[];const sec=SECS.find(s=>s.id===sid)||{name:sid,ic:'var(--text3)'};return[`<div class="mg-sec-label" style="color:${sec.ic}">${sec.name}</div><div>${items.map(cH).join('')}</div>`];}).join('')}</div>
    </div>`;
  }
  document.getElementById('mg-content').innerHTML = gridH + (blocks || `<div class="empty-state"><div class="ei">◫</div><div class="em">No history this week</div><div class="eh">Refresh fetches today's news into history</div></div>`);
}

function mgToggleBlock(date) { document.getElementById('db-'+date)?.classList.toggle('collapsed'); }

// ── Keyboard ESC ──────────────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.key === 'Escape' && active) {
    active = null;
    document.getElementById('ch-ey').textContent = 'GCC Intelligence · AI & Tech';
    document.getElementById('ch-ti').textContent = 'Daily Brief';
    document.getElementById('hview').style.display = 'block';
    document.getElementById('sview').style.display = 'none';
    document.getElementById('mgview').style.display = 'none';
    ['saved','manage'].forEach(x => { document.getElementById('ni-'+x)?.classList.remove('active'); document.getElementById('mn-'+x)?.classList.remove('active'); });
    SECS.forEach(s => { document.getElementById('ni-'+s.id)?.classList.remove('active'); document.getElementById('mn-'+s.id)?.classList.remove('active'); });
    _renderHome();
  }
});

// ── PWA ───────────────────────────────────────────────────────────────────────
const mf = {name:'Daily Brief',short_name:'Daily Brief',start_url:'/',display:'standalone',background_color:'#080d1a',theme_color:'#080d1a',orientation:'portrait-primary',icons:[{src:"data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%23080d1a'/%3E%3Ctext y='.9em' font-size='72' x='12'%3E%E2%97%89%3C/text%3E%3C/svg%3E",sizes:'512x512',type:'image/svg+xml'}]};
const mb = new Blob([JSON.stringify(mf)],{type:'application/json'});
const ml = document.createElement('link'); ml.rel='manifest'; ml.href=URL.createObjectURL(mb);
document.head.appendChild(ml);

window.addEventListener('DOMContentLoaded', init);
</script>

<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#08090f" id="theme-meta">
<meta name="description" content="GCC AI & Tech Intelligence Brief">
<title>GCC Intel · Daily Brief</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
<style>
:root,[data-theme="dark"]{
  --bg:#08090f;--bg2:#0d0e1a;--surface:#111528;--surface2:#161929;--surface3:#1c2035;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);--border3:rgba(255,255,255,0.22);
  --text:#e8e3d5;--text2:#8e8eab;--text3:#4a4a6e;
  --gold:#c9a84c;--green:#10b981;--teal:#4db6ac;--accent:#4f8ef7;
  --serif:'Playfair Display',Georgia,serif;--sans:'DM Sans',system-ui,sans-serif;
  --r:12px;--rl:16px;--hh:64px;
  --save-idle:#4a4a6e;--save-on:#c9a84c;
}
[data-theme="light"]{
  --bg:#f0f4ff;--bg2:#ffffff;--surface:#f8faff;--surface2:#eef2ff;--surface3:#dde4f5;
  --border:rgba(0,0,0,0.07);--border2:rgba(0,0,0,0.12);--border3:rgba(0,0,0,0.22);
  --text:#0d1424;--text2:#3d5275;--text3:#8493b0;
  --gold:#b8860b;--green:#059669;--teal:#0d9488;--accent:#2563eb;
  --save-idle:#94a3b8;--save-on:#d97706;
}
[data-theme="light"] .why{background:var(--surface2)}
[data-theme="light"] .mg-date-input{background:var(--surface);color:var(--text);border-color:var(--border2)}
[data-theme="light"] .day-header{background:var(--surface2)}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{height:100%;font-size:16px}
body{min-height:100%;font-family:var(--sans);background:var(--bg);color:var(--text);-webkit-tap-highlight-color:transparent;transition:background .2s,color .2s}
button{font-family:var(--sans);cursor:pointer}
a{color:inherit;text-decoration:none}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-thumb{background:var(--surface3);border-radius:4px}

/* ── HEADER ────────────────────────────── */
.hdr{
  position:fixed;top:0;left:0;right:0;z-index:100;
  height:var(--hh);
  background:var(--bg2);border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 28px;gap:16px;
}
.hdr-left{display:flex;align-items:center;gap:14px}
.back-btn{
  display:none;align-items:center;justify-content:center;
  width:32px;height:32px;border-radius:8px;
  border:1px solid var(--border2);background:var(--surface);
  color:var(--text2);font-size:16px;transition:background .12s;flex-shrink:0;
}
.back-btn:hover{background:var(--surface2);color:var(--text)}
.back-btn.visible{display:flex}
.brand-wrap{cursor:pointer;flex-shrink:0}
.brand-title{font-family:var(--serif);font-size:20px;color:var(--gold);font-weight:400;letter-spacing:.3px;line-height:1}
.brand-sub{font-size:8px;text-transform:uppercase;letter-spacing:2.5px;color:var(--text3);margin-top:2px}
.hdr-sec-info{display:flex;flex-direction:column;justify-content:center;flex:1;min-width:0}
.hdr-sec-ey{font-size:9px;color:var(--teal);text-transform:uppercase;letter-spacing:2px;display:none}
.hdr-sec-name{font-family:var(--serif);font-size:20px;color:var(--gold);font-weight:400;display:none;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hdr-sec-info.active .hdr-sec-ey{display:block}
.hdr-sec-info.active .hdr-sec-name{display:block}
.hdr-right{display:flex;align-items:center;gap:8px;flex-shrink:0}
.hdr-btn{
  display:flex;align-items:center;gap:5px;
  padding:5px 10px;border-radius:20px;
  border:1px solid var(--border2);background:var(--surface);
  color:var(--text2);font-size:11px;font-weight:500;
  transition:background .12s,color .12s,border-color .12s;white-space:nowrap;
}
.hdr-btn:hover{background:var(--surface2);color:var(--text)}
.hdr-btn .hdr-btn-icon{font-size:13px}
.hdr-btn.saved-btn .hdr-btn-icon{color:var(--gold)}
.hdr-btn.archive-btn .hdr-btn-icon{color:var(--teal)}
.auto-badge{
  font-size:10px;color:var(--teal);
  background:rgba(77,182,172,.1);padding:4px 9px;
  border-radius:20px;border:1px solid rgba(77,182,172,.2);
  white-space:nowrap;display:none;
}
.theme-btn{
  display:flex;align-items:center;justify-content:center;
  width:32px;height:32px;border-radius:50%;
  border:1px solid var(--border2);background:var(--surface);
  color:var(--text2);font-size:14px;transition:background .12s;
}
.theme-btn:hover{background:var(--surface2);color:var(--text)}

/* ── PAGE WRAPPER ──────────────────────── */
#page{margin-top:var(--hh);min-height:calc(100vh - var(--hh))}

/* ── HOME GRID ──────────────────────────── */
#hview{padding:28px 28px 48px;max-width:1300px;margin:0 auto}
.home-date-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;padding-bottom:16px;border-bottom:1px solid var(--border)}
.home-greeting{font-family:var(--serif);font-size:24px;color:var(--gold);font-weight:400}
.home-greeting span{font-style:italic}
.home-date{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:1.5px}
.home-sub{font-size:10px;color:var(--text2);margin-top:3px}
.home-grid-label{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:2px;color:var(--text3);margin-bottom:16px}
.home-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}

/* Section card on home */
.sec-card{
  background:var(--bg2);border:1px solid var(--border);border-radius:16px;
  overflow:hidden;cursor:pointer;transition:border-color .15s,transform .15s,box-shadow .15s;
}
.sec-card:hover{border-color:var(--gold);transform:translateY(-3px);box-shadow:0 10px 30px rgba(0,0,0,.25)}
.sc-img{position:relative;height:160px;overflow:hidden;background:var(--surface);flex-shrink:0}
.sc-img img{width:100%;height:100%;object-fit:cover;display:block;filter:brightness(.6);transition:filter .2s}
.sec-card:hover .sc-img img{filter:brightness(.75)}
.sc-img-grad{width:100%;height:100%;display:block}
.sc-img-overlay{position:absolute;inset:0;display:flex;flex-direction:column;justify-content:space-between;padding:10px 12px}
.sc-roman{
  font-family:var(--serif);font-size:11px;color:rgba(255,255,255,.7);
  background:rgba(0,0,0,.4);padding:2px 8px;border-radius:20px;align-self:flex-start;
}
.sc-sec-name{
  font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;
  color:rgba(255,255,255,.9);background:rgba(0,0,0,.5);
  padding:3px 8px;border-radius:4px;align-self:flex-start;
}
.sc-body{padding:14px 16px 16px}
.sc-title{
  font-family:var(--serif);font-size:14px;color:var(--text);
  line-height:1.45;margin-bottom:10px;
  display:-webkit-box;-webkit-line-clamp:3;line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;min-height:60px;
}
.sc-foot{display:flex;align-items:center;justify-content:space-between;gap:6px}
.sc-src{font-size:10px;color:var(--accent);font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sc-age{font-size:9px;color:var(--text3);flex-shrink:0;white-space:nowrap}
.sc-empty{color:var(--text3);font-size:11px;font-style:italic;min-height:60px;display:flex;align-items:center}

/* ── SECTION VIEW ────────────────────────── */
#sview{display:none;padding:24px 28px 48px;max-width:1200px;margin:0 auto}
.sec-header{margin-bottom:24px;padding-bottom:16px;border-bottom:1px solid var(--border)}
.sec-header-ey{font-size:9px;color:var(--teal);text-transform:uppercase;letter-spacing:2.5px;margin-bottom:6px}
.sec-header-title{font-family:var(--serif);font-size:30px;color:var(--gold);font-weight:400;line-height:1}

.cards-2col{display:grid;grid-template-columns:1fr 1fr;gap:0}
.news-card{padding:24px 28px;border-bottom:1px solid var(--border);border-right:1px solid var(--border)}
.news-card:nth-child(even){border-right:none}
.news-card:last-child:nth-child(odd){grid-column:span 2}

.card-img-wrap{position:relative;height:180px;overflow:hidden;background:var(--surface);border-radius:10px;margin-bottom:16px}
.card-img-wrap img{width:100%;height:100%;object-fit:cover;display:block;border-radius:10px}
.card-img-grad{width:100%;height:100%;border-radius:10px;display:block}

.card-meta{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:10px}
.ctag{font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:1.2px;color:var(--text3)}
.cage{font-size:9px;color:var(--text3);white-space:nowrap;flex-shrink:0}
.ctitle{font-family:var(--serif);font-size:20px;font-weight:600;color:var(--text);line-height:1.35;margin-bottom:10px}
.cbody{font-size:13px;color:var(--text2);line-height:1.65;margin-bottom:14px}
.why{background:transparent;border:none;border-radius:0;padding:0;margin-bottom:14px;font-size:12px;color:var(--text2);line-height:1.55}
.why strong{display:block;font-size:9px;color:var(--teal);text-transform:uppercase;letter-spacing:2px;font-weight:600;font-family:var(--sans);margin-bottom:5px}
.cfoot{display:flex;align-items:center;justify-content:space-between;border-top:1px solid var(--border);padding-top:12px;margin-top:4px}
.csrc-name{font-size:10px;color:var(--text3)}
.cfoot-right{display:flex;align-items:center;gap:10px}
.read-src{font-size:11px;color:var(--accent);text-decoration:none;transition:color .12s}
.read-src:hover{color:var(--gold)}
.save-btn{background:transparent;border:none;padding:2px 4px;border-radius:6px;font-size:15px;color:var(--save-idle);cursor:pointer;transition:color .15s,transform .1s;line-height:1}
.save-btn:hover{color:var(--save-on);transform:scale(1.15)}
.save-btn.saved{color:var(--save-on)}
.divider{font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:2px;color:var(--text3);padding:18px 28px 10px;border-bottom:1px solid var(--border)}
.skel{padding:20px 0;border-bottom:1px solid var(--border)}
.sl{border-radius:6px;background:var(--surface2);animation:sh 1.5s infinite;margin-bottom:8px}
@keyframes sh{0%,100%{opacity:.3}50%{opacity:.7}}
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;text-align:center}
.empty-state .ei{font-size:36px;opacity:.2;margin-bottom:14px}
.empty-state .em{font-size:14px;color:var(--text2);margin-bottom:6px;font-weight:500}
.empty-state .eh{font-size:12px;color:var(--text3)}

/* ── MANAGE DATA ──────────────────────── */
#mgview{display:none;padding:24px 28px 48px;max-width:1000px;margin:0 auto}
.mg-controls{display:flex;align-items:center;gap:10px;margin-bottom:20px;flex-wrap:wrap}
.mg-date-input{padding:6px 11px;border-radius:var(--r);border:1px solid var(--border2);background:var(--surface);color:var(--text);font-family:var(--sans);font-size:12px;outline:none}
.mg-date-input:focus{border-color:var(--accent)}
.mg-btn{padding:6px 12px;border-radius:var(--r);border:1px solid var(--border2);background:var(--surface);color:var(--text2);font-size:11px;font-family:var(--sans);transition:all .12s;white-space:nowrap}
.mg-btn:hover{background:var(--surface2);color:var(--text)}
.mg-btn.active{background:var(--accent);border-color:var(--accent);color:#fff}
.mg-nav-row{display:flex;align-items:center;gap:6px}
.mg-arrow{width:26px;height:26px;border-radius:7px;border:1px solid var(--border2);background:var(--surface);color:var(--text2);font-size:13px;display:flex;align-items:center;justify-content:center;transition:background .12s}
.mg-arrow:hover{background:var(--surface2);color:var(--text)}
.mg-date-label{font-size:12px;color:var(--text2);font-weight:500;min-width:130px;text-align:center}
.mg-section-filter{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:18px}
.mg-filter-chip{padding:3px 10px;border-radius:20px;border:1px solid var(--border2);background:transparent;color:var(--text3);font-size:10px;font-weight:500;font-family:var(--sans);transition:all .12s;cursor:pointer}
.mg-filter-chip:hover{background:var(--surface2);color:var(--text2)}
.mg-filter-chip.active{background:var(--accent);border-color:var(--accent);color:#fff}
.day-block{border:1px solid var(--border);border-radius:var(--rl);overflow:hidden;margin-bottom:14px}
.day-header{padding:11px 16px;background:var(--surface);display:flex;align-items:center;justify-content:space-between;cursor:pointer;user-select:none}
.day-date{font-size:13px;font-weight:600;color:var(--text)}
.day-count{font-size:10px;color:var(--text3);margin-left:10px}
.day-chevron{font-size:11px;color:var(--text3);transition:transform .2s}
.day-block.collapsed .day-chevron{transform:rotate(-90deg)}
.day-cards{padding:0 16px}
.day-block.collapsed .day-cards{display:none}
.mg-sec-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:1.2px;color:var(--text3);padding:14px 0 6px;border-bottom:1px solid var(--border)}
.weekly-summary{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);padding:16px;margin-bottom:20px}
.ws-title{font-family:var(--serif);font-size:17px;color:var(--text);margin-bottom:2px}
.ws-sub{font-size:11px;color:var(--text3);margin-bottom:14px}
.ws-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px}
.ws-day{border:1px solid var(--border);border-radius:var(--r);padding:10px 8px;cursor:pointer;transition:background .12s,border-color .12s;text-align:center}
.ws-day:hover{background:var(--surface2);border-color:var(--border2)}
.ws-day.today{border-color:var(--accent)}
.ws-day-name{font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.8px;color:var(--text3);margin-bottom:3px}
.ws-day-date{font-size:11px;color:var(--text2);margin-bottom:5px}
.ws-day-count{font-size:10px;color:var(--accent);font-weight:500}
.lr{font-size:10px;color:var(--text3);margin-top:8px;font-style:italic}

/* ── TOAST ────────────────────────────── */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--surface2);border:1px solid var(--border2);border-radius:24px;padding:9px 18px;font-size:12px;color:var(--text2);z-index:500;opacity:0;transition:opacity .25s;pointer-events:none;white-space:nowrap;max-width:calc(100vw - 28px);text-align:center}
.toast.show{opacity:1}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.fu{animation:fadeUp .22s ease both}
@keyframes bl{0%,100%{opacity:1}50%{opacity:.3}}
.loading-txt{color:var(--accent);animation:bl 1s infinite}
.live-dot{width:5px;height:5px;border-radius:50%;background:var(--green);animation:bl 2s infinite;flex-shrink:0}

/* ── RESPONSIVE ───────────────────────── */
@media(max-width:1100px){
  .home-grid{grid-template-columns:repeat(3,1fr)}
}
@media(max-width:767px){
  .hdr{padding:0 14px;height:56px}
  :root{--hh:56px}
  .brand-sub{display:none}
  .hdr-btn span.hdr-btn-label{display:none}
  #hview{padding:16px 14px 40px}
  .home-grid{grid-template-columns:repeat(2,1fr);gap:10px}
  .sc-img{height:120px}
  .home-date-bar{flex-direction:column;align-items:flex-start;gap:6px}
  #sview{padding:16px 14px 40px}
  .cards-2col{grid-template-columns:1fr}
  .news-card{border-right:none}
  .news-card:last-child:nth-child(odd){grid-column:span 1}
  .ctitle{font-size:16px}
  .cbody{font-size:12px}
  #mgview{padding:16px 14px 40px}
  .ws-grid{grid-template-columns:repeat(3,1fr)}
  .card-img-wrap{height:130px}
}
@media(min-width:1400px){
  .home-grid{grid-template-columns:repeat(4,1fr)}
}
</style>
</head>
<body>

<!-- HEADER -->
<header class="hdr">
  <div class="hdr-left">
    <button class="back-btn" id="back-btn" onclick="goHome()" title="Back to home">&#8592;</button>
    <div class="brand-wrap" onclick="goHome()">
      <div class="brand-title">GCC Intel</div>
      <div class="brand-sub">Chairman's Daily Brief</div>
    </div>
    <div class="hdr-sec-info" id="hdr-sec-info">
      <div class="hdr-sec-ey" id="hdr-sec-ey"></div>
      <div class="hdr-sec-name" id="hdr-sec-name"></div>
    </div>
  </div>
  <div class="hdr-right">
    <button class="hdr-btn saved-btn" onclick="openSec('saved')" title="Saved articles">
      <span class="hdr-btn-icon">★</span><span class="hdr-btn-label" id="saved-count-lbl">Saved</span>
    </button>
    <button class="hdr-btn archive-btn" onclick="openSec('manage')" title="Archive">
      <span class="hdr-btn-icon">◫</span><span class="hdr-btn-label">Archive</span>
    </button>
    <span class="auto-badge" id="auto-badge">↻ <span id="ar-countdown"></span></span>
    <button class="theme-btn" id="theme-toggle" onclick="toggleTheme()" title="Toggle theme">☀</button>
  </div>
</header>

<div id="page">

  <!-- HOME GRID -->
  <div id="hview">
    <div class="home-date-bar">
      <div>
        <div class="home-greeting" id="home-greeting">Good morning, <span>GM Rao, Sir</span></div>
        <div class="home-date" id="home-date"></div>
      </div>
      <div style="text-align:right">
        <div class="home-sub" style="font-size:10px;color:var(--teal)">GCC AI &amp; Technology Intelligence</div>
        <div class="lr" id="lr"></div>
      </div>
    </div>
    <div class="home-grid-label">Intelligence Sections</div>
    <div class="home-grid" id="home-grid"></div>
  </div>

  <!-- SECTION CARDS -->
  <div id="sview">
    <div class="sec-header">
      <div class="sec-header-ey" id="sec-ey"></div>
      <div class="sec-header-title" id="sec-title"></div>
    </div>
    <div id="cards"></div>
  </div>

  <!-- MANAGE DATA -->
  <div id="mgview">
    <div class="sec-header">
      <div class="sec-header-ey">Archive</div>
      <div class="sec-header-title">Past Editions</div>
    </div>
    <div class="mg-controls">
      <div class="mg-nav-row">
        <button class="mg-arrow" onclick="mgShiftDay(-1)">&#8249;</button>
        <span class="mg-date-label" id="mg-date-label">Today</span>
        <button class="mg-arrow" onclick="mgShiftDay(1)" id="mg-next-btn">&#8250;</button>
      </div>
      <input type="date" class="mg-date-input" id="mg-date-input" onchange="mgPickDate(this.value)">
      <button class="mg-btn" id="mg-week-btn" onclick="mgToggleWeek()">This Week</button>
    </div>
    <div class="mg-section-filter" id="mg-sec-filter"></div>
    <div id="mg-content"></div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
const API = '/api/refresh';
const SECS = [
  {id:'exec',      name:'Executive Snapshot',    short:'Exec',   ey:"Chairman's 60-Second Scan",      roman:'I',   grad:'linear-gradient(135deg,#1e3a8a,#3b82f6)',   ic:'#93c5fd'},
  {id:'themes',    name:'Strategic Themes',       short:'Themes', ey:'Patterns · Strategic Signals',   roman:'II',  grad:'linear-gradient(135deg,#4c1d95,#8b5cf6)',   ic:'#c4b5fd'},
  {id:'deals',     name:'Deals & Capital',        short:'Deals',  ey:'Ecosystem Clustering',           roman:'III', grad:'linear-gradient(135deg,#064e3b,#10b981)',   ic:'#6ee7b7'},
  {id:'risks',     name:'Risks & Opportunities',  short:'Risks',  ey:'CEO-Level Framing',              roman:'IV',  grad:'linear-gradient(135deg,#78350f,#f59e0b)',   ic:'#fcd34d'},
  {id:'competitor',name:'Market Moves',           short:'Moves',  ey:'Who Moved and Why',              roman:'V',   grad:'linear-gradient(135deg,#92400e,#f59e0b)',   ic:'#fcd34d'},
  {id:'talent',    name:'Talent Signals',         short:'Talent', ey:'Hiring · Salaries · Risk',       roman:'VI',  grad:'linear-gradient(135deg,#134e4a,#14b8a6)',   ic:'#5eead4'},
  {id:'policy',    name:'Policy & Regulation',    short:'Policy', ey:'Compliance · Act or Monitor',    roman:'VII', grad:'linear-gradient(135deg,#7f1d1d,#ef4444)',   ic:'#fca5a5'},
  {id:'tech',      name:'Technology Signals',     short:'Tech',   ey:'GCC-Relevant Shifts Only',       roman:'VIII',grad:'linear-gradient(135deg,#1e40af,#60a5fa)',   ic:'#93c5fd'},
];

const cache = {}, loading = {};
let active = null;
const savedTitles = new Set();
const itemMap = {};

// ── Theme ─────────────────────────────────────────────────────────────────────
function toggleTheme() {
  const html = document.documentElement;
  const dark = html.getAttribute('data-theme') === 'dark';
  const next = dark ? 'light' : 'dark';
  html.setAttribute('data-theme', next);
  localStorage.setItem('gcc-theme', next);
  document.getElementById('theme-toggle').textContent = dark ? '🌙' : '☀';
  document.getElementById('theme-meta').setAttribute('content', dark ? '#ffffff' : '#08090f');
}

// ── Toast ─────────────────────────────────────────────────────────────────────
let _tt;
function toast(m, d = 2800) {
  const t = document.getElementById('toast');
  t.textContent = m; t.classList.add('show');
  clearTimeout(_tt); _tt = setTimeout(() => t.classList.remove('show'), d);
}

// ── Item key ──────────────────────────────────────────────────────────────────
function itemKey(title) {
  let h = 0;
  for (let i = 0; i < title.length; i++) { h = ((h << 5) - h) + title.charCodeAt(i); h |= 0; }
  return 'k' + Math.abs(h);
}

// ── Saved ─────────────────────────────────────────────────────────────────────
function updateSavedCount() {
  const n = savedTitles.size;
  const el = document.getElementById('saved-count-lbl');
  if (el) el.textContent = n ? `Saved (${n})` : 'Saved';
}

async function toggleSave(key, evt) {
  if (evt) evt.stopPropagation();
  const item = itemMap[key]; if (!item) return;
  const was = savedTitles.has(item.title);
  was ? savedTitles.delete(item.title) : savedTitles.add(item.title);
  document.querySelectorAll(`.save-btn[data-key="${key}"]`).forEach(b => {
    b.classList.toggle('saved', !was); b.textContent = was ? '☆' : '★';
  });
  updateSavedCount();
  try {
    await fetch('/api/save', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({title:item.title,item,action:was?'unsave':'save'}) });
    if (!was) { if (!cache.saved) cache.saved = []; cache.saved = [item,...cache.saved.filter(i=>i.title!==item.title)]; }
    else { if (cache.saved) cache.saved = cache.saved.filter(i=>i.title!==item.title); if (active==='saved') renderCards('saved'); }
    toast(was ? 'Removed from saved' : 'Saved ✓');
  } catch {
    was ? savedTitles.add(item.title) : savedTitles.delete(item.title);
    document.querySelectorAll(`.save-btn[data-key="${key}"]`).forEach(b => { b.classList.toggle('saved',was); b.textContent=was?'★':'☆'; });
    updateSavedCount();
  }
}

async function loadSaved() {
  try {
    const res = await fetch('/api/saved'); if (!res.ok) return;
    const items = await res.json();
    items.forEach(item => { savedTitles.add(item.title); itemMap[itemKey(item.title)] = item; });
    cache.saved = items; updateSavedCount();
  } catch {}
}

// ── Auto-refresh 4h ───────────────────────────────────────────────────────────
const REFRESH_MS = 4 * 60 * 60 * 1000;
let nextRefreshAt = null;

async function setupRefreshTimer() {
  try {
    const res = await fetch('/api/settings'); if (!res.ok) { scheduleFromNow(); return; }
    const s = await res.json();
    const last = s.last_refresh ? new Date(s.last_refresh) : null;
    if (last) {
      const age = Date.now() - last.getTime();
      nextRefreshAt = age < REFRESH_MS
        ? new Date(last.getTime() + REFRESH_MS)
        : new Date(Date.now() + REFRESH_MS);
    } else { scheduleFromNow(); return; }
    startCountdown();
  } catch { scheduleFromNow(); }
}

function scheduleFromNow() {
  nextRefreshAt = new Date(Date.now() + REFRESH_MS);
  startCountdown();
}

function startCountdown() {
  const badge = document.getElementById('auto-badge');
  const cd = document.getElementById('ar-countdown');
  if (!nextRefreshAt) return;
  const tick = () => {
    const diff = nextRefreshAt - Date.now();
    if (diff <= 0) {
      if (badge) badge.style.display = 'none';
      toast('Auto-refreshing…', 6000);
      nextRefreshAt = new Date(Date.now() + REFRESH_MS);
      refreshAll().then(() => startCountdown());
      return;
    }
    const h = Math.floor(diff / 3600000), m = Math.floor((diff % 3600000) / 60000);
    if (cd) cd.textContent = h > 0 ? `${h}h ${m}m` : `${m}m`;
    if (badge) badge.style.display = '';
  };
  tick(); clearInterval(window._arTimer); window._arTimer = setInterval(tick, 30000);
}

// ── Init ──────────────────────────────────────────────────────────────────────
async function init() {
  const theme = localStorage.getItem('gcc-theme') || 'dark';
  document.documentElement.setAttribute('data-theme', theme);
  document.getElementById('theme-toggle').textContent = theme === 'dark' ? '☀' : '🌙';
  document.getElementById('theme-meta').setAttribute('content', theme === 'dark' ? '#08090f' : '#ffffff');

  const d = new Date();
  document.getElementById('home-date').textContent = d.toLocaleDateString('en-GB', {weekday:'long', day:'numeric', month:'long', year:'numeric'});
  const h = d.getHours();
  const greet = h < 12 ? 'Good morning' : h < 17 ? 'Good afternoon' : 'Good evening';
  document.getElementById('home-greeting').innerHTML = `${greet}, <span>GM Rao, Sir</span>`;

  try { const r = await fetch('/api/data'); if (r.ok) Object.assign(cache, await r.json()); } catch {}
  await loadSaved();
  _renderHome();
  setupRefreshTimer();
  mgInit();
}

// ── Home grid ─────────────────────────────────────────────────────────────────
let _homeRenderPending = false;
function renderHomeGrid() {
  if (_homeRenderPending) return;
  _homeRenderPending = true;
  requestAnimationFrame(() => { _homeRenderPending = false; _renderHome(); });
}

function _renderHome() {
  const grid = document.getElementById('home-grid');
  if (!grid) return;
  grid.innerHTML = SECS.map(s => {
    const item = cache[s.id]?.[0];
    const key = item ? itemKey(item.title) : '';
    if (item) itemMap[key] = item;
    const imgUrl = item?.img;
    const imgHtml = imgUrl
      ? `<img src="${imgUrl}" alt="" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='block'">`
        + `<div class="sc-img-grad" style="background:${s.grad};display:none"></div>`
      : `<div class="sc-img-grad" style="background:${s.grad}"></div>`;
    return `<div class="sec-card fu" onclick="openSec('${s.id}')">
      <div class="sc-img">
        ${imgHtml}
        <div class="sc-img-overlay">
          <span class="sc-roman">${s.roman}</span>
          <span class="sc-sec-name">${s.name}</span>
        </div>
      </div>
      <div class="sc-body">
        <div class="sc-title">${item ? item.title : '<span class="sc-empty">Loading…</span>'}</div>
        <div class="sc-foot">
          <span class="sc-src">${item ? '↗ '+item.src : ''}</span>
          <span class="sc-age">${item ? item.age||'' : ''}</span>
        </div>
      </div>
    </div>`;
  }).join('');
}

// ── Tile state ────────────────────────────────────────────────────────────────
function setTile(id, state) {
  if (document.getElementById('hview').style.display !== 'none') renderHomeGrid();
}

// ── Navigation ────────────────────────────────────────────────────────────────
function goHome() {
  active = null;
  document.getElementById('hview').style.display = 'block';
  document.getElementById('sview').style.display = 'none';
  document.getElementById('mgview').style.display = 'none';
  document.getElementById('back-btn').classList.remove('visible');
  document.getElementById('hdr-sec-info').classList.remove('active');
  _renderHome();
}

function openSec(id) {
  active = id;
  document.getElementById('hview').style.display = 'none';
  document.getElementById('sview').style.display = 'none';
  document.getElementById('mgview').style.display = 'none';
  document.getElementById('back-btn').classList.add('visible');

  const secInfo = document.getElementById('hdr-sec-info');
  if (id === 'saved') {
    document.getElementById('hdr-sec-ey').textContent = 'Your Collection';
    document.getElementById('hdr-sec-name').textContent = 'Saved Articles';
    document.getElementById('sec-ey').textContent = 'Your Collection';
    document.getElementById('sec-title').textContent = 'Saved Articles';
    secInfo.classList.add('active');
    document.getElementById('sview').style.display = 'block';
    renderCards('saved');
  } else if (id === 'manage') {
    document.getElementById('hdr-sec-ey').textContent = 'History';
    document.getElementById('hdr-sec-name').textContent = 'Archive';
    secInfo.classList.add('active');
    document.getElementById('mgview').style.display = 'block';
  } else {
    const s = SECS.find(x => x.id === id);
    if (s) {
      document.getElementById('hdr-sec-ey').textContent = s.ey;
      document.getElementById('hdr-sec-name').textContent = s.name;
      document.getElementById('sec-ey').textContent = s.ey;
      document.getElementById('sec-title').textContent = s.name;
    }
    secInfo.classList.add('active');
    document.getElementById('sview').style.display = 'block';
    renderCards(id);
  }
  window.scrollTo(0, 0);
}

// ── Render cards ──────────────────────────────────────────────────────────────
function renderCards(id) {
  const w = document.getElementById('cards');
  if (id === 'saved') {
    const items = cache.saved || [];
    w.innerHTML = items.length ? '<div class="cards-2col">' + items.map(cH).join('') + '</div>'
      : `<div class="empty-state"><div class="ei">★</div><div class="em">No saved articles yet</div><div class="eh">Tap ☆ on any article to save it here</div></div>`;
    return;
  }
  const items = cache[id];
  if (!items) { w.innerHTML = skelHTML(); return; }
  let h = '';
  if (id === 'risks') {
    const r = items.filter(i => i.pill === 'Risk'), o = items.filter(i => i.pill === 'Opp');
    h = (r.length ? '<div class="divider">Risk</div><div class="cards-2col">' + r.map(cH).join('') + '</div>' : '') +
        (o.length ? '<div class="divider">Opportunity</div><div class="cards-2col">' + o.map(cH).join('') + '</div>' : '');
    if (!h) h = '<div class="cards-2col">' + items.map(cH).join('') + '</div>';
  } else {
    h = '<div class="cards-2col">' + items.map(cH).join('') + '</div>';
  }
  w.innerHTML = h;
  window.scrollTo(0, 0);
}

function cH(item) {
  const key = itemKey(item.title);
  itemMap[key] = item;
  const on = savedTitles.has(item.title);
  const srcLink = item.url
    ? `<a class="read-src" href="${item.url}" target="_blank" rel="noopener">↗ Read source</a>`
    : '';
  const sec = SECS.find(s => cache[s.id]?.some(i => i.title === item.title));
  const grad = sec ? sec.grad : 'linear-gradient(135deg,#1e3a8a,#3b82f6)';
  const imgHtml = item.img
    ? `<img src="${item.img}" alt="" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='block'"><div class="card-img-grad" style="background:${grad};display:none"></div>`
    : `<div class="card-img-grad" style="background:${grad}"></div>`;
  return `<div class="news-card fu">
  ${item.img !== undefined ? `<div class="card-img-wrap">${imgHtml}</div>` : ''}
  <div class="card-meta">
    <span class="ctag">${item.tag||''}</span>
    <span class="cage">${item.age||''}</span>
  </div>
  <div class="ctitle">${item.title}</div>
  <div class="cbody">${item.body}</div>
  <div class="why">${item.why}</div>
  <div class="cfoot">
    <span class="csrc-name">${item.src||''}</span>
    <div class="cfoot-right">
      ${srcLink}
      <button class="save-btn${on?' saved':''}" data-key="${key}" onclick="toggleSave('${key}',event)" title="${on?'Remove':'Save'}">${on?'★':'☆'}</button>
    </div>
  </div>
</div>`;
}

function skelHTML() {
  return '<div class="cards-2col">' + Array(4).fill(0).map(() => `
  <div class="news-card skel-card">
    <div class="sl" style="height:160px;border-radius:10px;margin-bottom:16px"></div>
    <div style="display:flex;gap:10px;margin-bottom:10px"><div class="sl" style="height:12px;flex:1"></div><div class="sl" style="height:12px;width:60px"></div></div>
    <div class="sl" style="height:18px;width:100%;margin-bottom:8px"></div>
    <div class="sl" style="height:18px;width:75%"></div>
    <div class="sl" style="height:52px;width:100%;margin-top:14px;border-radius:8px"></div>
  </div>`).join('') + '</div>';
}

// ── Load section ──────────────────────────────────────────────────────────────
async function loadSection(id) {
  if (loading[id] || ['saved','manage'].includes(id)) return;
  loading[id] = true; setTile(id, 'loading');
  if (active === id) renderCards(id);
  try {
    const res = await fetch(API, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({section:id}) });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const d = await res.json();
    if (d.error) throw new Error(d.error);
    if (!Array.isArray(d.items)) throw new Error('Bad format');
    cache[id] = d.items; setTile(id, 'done');
    if (active === id) renderCards(id);
  } catch (e) {
    console.error(id, e.message); setTile(id, 'error');
    toast((SECS.find(s=>s.id===id)||{}).name + ': ' + e.message);
  } finally { loading[id] = false; }
}

// ── Refresh all ───────────────────────────────────────────────────────────────
async function refreshAll() {
  toast('Searching the web for today\'s news…', 8000);
  SECS.forEach(s => { delete cache[s.id]; delete loading[s.id]; });
  _renderHome();
  if (active && !['saved','manage'].includes(active)) renderCards(active);
  await Promise.allSettled(SECS.map(s => loadSection(s.id)));
  const now = new Date();
  const lrel = document.getElementById('lr');
  if (lrel) lrel.textContent = 'Last refreshed: ' + now.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'}) + ' · ' + now.toLocaleDateString('en-GB',{day:'numeric',month:'short'});
  toast('All sections updated ✓');
  if (active && !['saved','manage'].includes(active)) renderCards(active);
  nextRefreshAt = new Date(Date.now() + REFRESH_MS); startCountdown();
  const highItems = SECS.flatMap(s => (cache[s.id]||[]).filter(i => ['High','Act Now','Risk','Accelerating'].includes(i.pill)));
  if (highItems.length) fetch('/api/teams-notify', {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({items:highItems})}).catch(()=>{});
}

// ── MANAGE DATA ───────────────────────────────────────────────────────────────
let mgDate = new Date().toISOString().split('T')[0];
let mgWeekMode = false;
let mgActiveFilter = 'all';

function mgInit() {
  document.getElementById('mg-date-input').value = mgDate;
  mgBuildFilter();
}
function mgBuildFilter() {
  document.getElementById('mg-sec-filter').innerHTML =
    [{id:'all',name:'All'}].concat(SECS.map(s=>({id:s.id,name:s.name}))).map(f =>
      `<button class="mg-filter-chip${mgActiveFilter===f.id?' active':''}" onclick="mgSetFilter('${f.id}')">${f.name}</button>`
    ).join('');
}
function mgSetFilter(id) { mgActiveFilter = id; mgBuildFilter(); mgWeekMode ? mgLoadWeek() : mgLoadDay(mgDate); }
function mgShiftDay(d) {
  const dt = new Date(mgDate); dt.setDate(dt.getDate() + d);
  const s = dt.toISOString().split('T')[0];
  if (s > new Date().toISOString().split('T')[0]) return;
  mgPickDate(s);
}
function mgPickDate(val) {
  mgDate = val; mgWeekMode = false;
  document.getElementById('mg-date-input').value = val;
  document.getElementById('mg-week-btn').classList.remove('active');
  mgLoadDay(val);
}
function mgToggleWeek() {
  mgWeekMode = !mgWeekMode;
  document.getElementById('mg-week-btn').classList.toggle('active', mgWeekMode);
  mgWeekMode ? mgLoadWeek() : mgLoadDay(mgDate);
}
async function mgLoadDay(date) {
  document.getElementById('mg-content').innerHTML = skelHTML();
  const today = new Date().toISOString().split('T')[0];
  document.getElementById('mg-date-label').textContent = (date===today?'Today · ':'') + new Date(date+'T12:00:00').toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'short',year:'numeric'});
  document.getElementById('mg-next-btn').disabled = date >= today;
  try {
    const res = await fetch('/api/history?date='+date);
    mgRenderDay((await res.json()).sections||{});
  } catch { document.getElementById('mg-content').innerHTML = '<div style="padding:28px;text-align:center;font-size:12px;color:var(--text3)">Failed to load</div>'; }
}
async function mgLoadWeek() {
  document.getElementById('mg-content').innerHTML = skelHTML();
  document.getElementById('mg-date-label').textContent = 'This Week (Mon – Fri)';
  try {
    const res = await fetch('/api/weekly');
    mgRenderWeek(await res.json());
  } catch { document.getElementById('mg-content').innerHTML = '<div style="padding:28px;text-align:center;font-size:12px;color:var(--text3)">Failed to load</div>'; }
}
function mgRenderDay(sections) {
  const order = mgActiveFilter === 'all' ? SECS.map(s=>s.id) : [mgActiveFilter];
  let html = '', total = 0;
  for (const sid of order) {
    const items = sections[sid]||[]; if (!items.length) continue; total += items.length;
    const sec = SECS.find(s=>s.id===sid)||{name:sid,ic:'var(--text3)'};
    html += `<div class="mg-sec-label" style="color:${sec.ic}">${sec.name}</div><div class="cards-2col">${items.map(cH).join('')}</div>`;
  }
  document.getElementById('mg-content').innerHTML = total ? html
    : `<div class="empty-state"><div class="ei">◫</div><div class="em">No data for this date</div><div class="eh">Refresh loads today's news into history</div></div>`;
}
function mgRenderWeek(data) {
  const today = new Date().toISOString().split('T')[0];
  const dayMap = {}; (data.days||[]).forEach(d => { dayMap[d.date] = d; });
  const start = new Date((data.start||today)+'T12:00:00');
  let gridH = `<div class="weekly-summary"><div class="ws-title">This Week</div><div class="ws-sub">${data.start||''} → ${data.end||''}</div><div class="ws-grid">`;
  for (let i = 0; i < 5; i++) {
    const d = new Date(start); d.setDate(start.getDate()+i);
    const ds = d.toISOString().split('T')[0];
    const dd = dayMap[ds], total = dd ? Object.values(dd.sections).reduce((s,a)=>s+a.length,0):0;
    const future = ds > today;
    gridH += `<div class="ws-day${ds===today?' today':''}" onclick="${future?'':` mgPickDate('${ds}');mgWeekMode=false;document.getElementById('mg-week-btn').classList.remove('active')`}">
      <div class="ws-day-name">${d.toLocaleDateString('en-GB',{weekday:'short'})}</div>
      <div class="ws-day-date">${d.toLocaleDateString('en-GB',{day:'numeric',month:'short'})}</div>
      <div class="ws-day-count">${future?'—':total?total+' items':'No data'}</div>
    </div>`;
  }
  gridH += '</div></div>';
  const order = mgActiveFilter === 'all' ? SECS.map(s=>s.id) : [mgActiveFilter];
  let blocks = '';
  for (const dd of (data.days||[])) {
    const total = order.reduce((s,sid)=>s+(dd.sections[sid]||[]).length,0); if (!total) continue;
    const label = dd.date===today ? 'Today' : new Date(dd.date+'T12:00:00').toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'short'});
    blocks += `<div class="day-block" id="db-${dd.date}">
      <div class="day-header" onclick="mgToggleBlock('${dd.date}')">
        <div style="display:flex;align-items:center"><span class="day-date">${label}</span><span class="day-count">${total} items</span></div>
        <span class="day-chevron">▾</span>
      </div>
      <div class="day-cards">${order.flatMap(sid=>{const items=dd.sections[sid]||[];if(!items.length)return[];const sec=SECS.find(s=>s.id===sid)||{name:sid,ic:'var(--text3)'};return[`<div class="mg-sec-label" style="color:${sec.ic}">${sec.name}</div><div class="cards-2col">${items.map(cH).join('')}</div>`];}).join('')}</div>
    </div>`;
  }
  document.getElementById('mg-content').innerHTML = gridH + (blocks || `<div class="empty-state"><div class="ei">◫</div><div class="em">No history this week</div><div class="eh">Refresh fetches today's news into history</div></div>`);
}
function mgToggleBlock(date) { document.getElementById('db-'+date)?.classList.toggle('collapsed'); }

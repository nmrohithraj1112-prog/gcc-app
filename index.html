<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#08090f" id="theme-meta">
<meta name="description" content="GCC AI & Tech Intelligence Brief">
<title>GCC Intel · Daily Brief</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
<style>
:root,[data-theme="dark"]{
  --bg:#08090f;--bg2:#0d0e1a;--surface:#111528;--surface2:#161929;--surface3:#1c2035;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);--border3:rgba(255,255,255,0.22);
  --text:#e8e3d5;--text2:#8e8eab;--text3:#4a4a6e;
  --gold:#c9a84c;--green:#10b981;--teal:#4db6ac;--accent:#4f8ef7;--red:#ef4444;
  --serif:'Playfair Display',Georgia,serif;--sans:'DM Sans',system-ui,sans-serif;
  --r:12px;--rl:16px;--hh:64px;
  --save-idle:#4a4a6e;--save-on:#c9a84c;
}
[data-theme="light"]{
  --bg:#f0f4ff;--bg2:#ffffff;--surface:#f8faff;--surface2:#eef2ff;--surface3:#dde4f5;
  --border:rgba(0,0,0,0.07);--border2:rgba(0,0,0,0.12);--border3:rgba(0,0,0,0.22);
  --text:#0d1424;--text2:#3d5275;--text3:#8493b0;
  --gold:#b8860b;--green:#059669;--teal:#0d9488;--accent:#2563eb;--red:#dc2626;
  --save-idle:#94a3b8;--save-on:#d97706;
}
[data-theme="light"] .why{background:var(--surface2)}
[data-theme="light"] .mg-date-input{background:var(--surface);color:var(--text);border-color:var(--border2)}
[data-theme="light"] .day-header{background:var(--surface2)}
[data-theme="light"] .progress-bar-wrap{background:var(--surface2)}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{height:100%;font-size:16px}
body{min-height:100%;font-family:var(--sans);background:var(--bg);color:var(--text);-webkit-tap-highlight-color:transparent;transition:background .2s,color .2s}
button{font-family:var(--sans);cursor:pointer}
a{color:inherit;text-decoration:none}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-thumb{background:var(--surface3);border-radius:4px}

/* ── HEADER ────────────────────────────── */
.hdr{position:fixed;top:0;left:0;right:0;z-index:100;height:var(--hh);background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 28px;gap:16px}
.hdr-left{display:flex;align-items:center;gap:14px}
.back-btn{display:none;align-items:center;justify-content:center;width:32px;height:32px;border-radius:8px;border:1px solid var(--border2);background:var(--surface);color:var(--text2);font-size:16px;transition:background .12s;flex-shrink:0}
.back-btn:hover{background:var(--surface2);color:var(--text)}
.back-btn.visible{display:flex}
.brand-wrap{cursor:pointer;flex-shrink:0}
.brand-title{font-family:var(--serif);font-size:20px;color:var(--gold);font-weight:400;letter-spacing:.3px;line-height:1}
.brand-sub{font-size:8px;text-transform:uppercase;letter-spacing:2.5px;color:var(--text3);margin-top:2px}
.hdr-sec-info{display:flex;flex-direction:column;justify-content:center;flex:1;min-width:0}
.hdr-sec-ey{font-size:9px;color:var(--teal);text-transform:uppercase;letter-spacing:2px;display:none}
.hdr-sec-name{font-family:var(--serif);font-size:20px;color:var(--gold);font-weight:400;display:none;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hdr-sec-info.active .hdr-sec-ey{display:block}
.hdr-sec-info.active .hdr-sec-name{display:block}
.hdr-right{display:flex;align-items:center;gap:8px;flex-shrink:0}
.hdr-btn{display:flex;align-items:center;gap:5px;padding:5px 10px;border-radius:20px;border:1px solid var(--border2);background:var(--surface);color:var(--text2);font-size:11px;font-weight:500;transition:background .12s,color .12s;white-space:nowrap}
.hdr-btn:hover{background:var(--surface2);color:var(--text)}
.hdr-btn .hdr-btn-icon{font-size:13px}
.hdr-btn.saved-btn .hdr-btn-icon{color:var(--gold)}
.hdr-btn.archive-btn .hdr-btn-icon{color:var(--teal)}
.hdr-btn.notif-btn .hdr-btn-icon{color:var(--text3)}
.hdr-btn.notif-btn.active .hdr-btn-icon{color:var(--gold)}
.hdr-btn.notif-btn.active{background:var(--surface2);border-color:var(--gold);color:var(--gold)}
.hdr-btn.notif-btn .notif-label{transition:all .15s}
.theme-btn{display:flex;align-items:center;justify-content:center;width:32px;height:32px;border-radius:50%;border:1px solid var(--border2);background:var(--surface);color:var(--text2);font-size:14px;transition:background .12s}
.theme-btn:hover{background:var(--surface2);color:var(--text)}

/* ── PAGE ────────────────────────────────── */
#page{margin-top:var(--hh);min-height:calc(100vh - var(--hh))}

/* ── PROGRESS PANEL ──────────────────────── */
#progress-panel{
  display:none;position:fixed;bottom:28px;left:50%;transform:translateX(-50%);z-index:200;
  background:var(--surface);border:1px solid var(--border2);border-radius:16px;
  padding:16px 20px;min-width:320px;max-width:90vw;
  box-shadow:0 8px 32px rgba(0,0,0,.4);
}
#progress-panel.visible{display:block}
.pp-title{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:1.5px;color:var(--teal);margin-bottom:10px}
.pp-status{font-size:12px;color:var(--text2);margin-bottom:10px;min-height:16px}
.progress-bar-wrap{height:6px;border-radius:3px;background:var(--surface3);overflow:hidden;margin-bottom:10px}
.progress-bar{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--teal),var(--accent));transition:width .4s ease;width:0%}
.pp-rows{display:flex;flex-direction:column;gap:4px}
.pp-row{display:flex;align-items:center;gap:8px;font-size:11px;color:var(--text3)}
.pp-row .pp-dot{width:7px;height:7px;border-radius:50%;background:var(--surface3);flex-shrink:0;transition:background .2s}
.pp-row.active .pp-dot{background:var(--accent);animation:pulse .8s infinite}
.pp-row.done .pp-dot{background:var(--green)}
.pp-row.fail .pp-dot{background:var(--red)}
.pp-row.active,.pp-row.done,.pp-row.fail{color:var(--text2)}
.pp-row .pp-label{flex:1}
.pp-row .pp-count{font-size:10px;color:var(--text3)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

/* ── HOME GRID ────────────────────────────── */
#hview{padding:28px 28px 48px;max-width:1300px;margin:0 auto}
.home-date-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;padding-bottom:16px;border-bottom:1px solid var(--border)}
.home-greeting{font-family:var(--serif);font-size:24px;color:var(--gold);font-weight:400}
.home-greeting span{font-style:italic}
.home-date{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:1.5px}
.home-sub{font-size:10px;color:var(--text2);margin-top:3px}
.home-grid-label{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:2px;color:var(--text3);margin-bottom:16px}
.home-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}

.sec-card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;overflow:hidden;cursor:pointer;transition:border-color .18s,transform .18s,box-shadow .18s;display:flex;flex-direction:column}
.sec-card:hover{border-color:var(--gold);transform:translateY(-3px);box-shadow:0 12px 32px rgba(0,0,0,.3)}
.sc-accent{height:4px;flex-shrink:0}
.sc-body{padding:14px 14px 16px;flex:1;display:flex;flex-direction:column}
.sc-label{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1.2px;color:var(--teal);margin-bottom:5px}
.sc-title{font-family:var(--serif);font-size:13px;color:var(--text);line-height:1.45;flex:1;margin-bottom:8px;display:-webkit-box;-webkit-line-clamp:3;line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.sc-foot{display:flex;align-items:center;justify-content:space-between;gap:6px;margin-top:auto}
.sc-src{font-size:10px;color:var(--accent);font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sc-age{font-size:9px;color:var(--text3);flex-shrink:0;white-space:nowrap}
.sc-empty{color:var(--text3);font-size:11px;font-style:italic}
.sc-card-loading .sc-title{color:var(--text3)}

/* ── SECTION VIEW ─────────────────────────── */
#sview{display:none;padding:24px 28px 48px;max-width:1200px;margin:0 auto}
.sec-header{margin-bottom:24px;padding-bottom:16px;border-bottom:1px solid var(--border)}
.sec-header-ey{font-size:9px;color:var(--teal);text-transform:uppercase;letter-spacing:2.5px;margin-bottom:6px}
.sec-header-title{font-family:var(--serif);font-size:30px;color:var(--gold);font-weight:400;line-height:1}

.cards-2col{display:grid;grid-template-columns:1fr 1fr;gap:0}
.news-card{padding:24px 28px;border-bottom:1px solid var(--border);border-right:1px solid var(--border)}
.news-card:nth-child(even){border-right:none}
.news-card:last-child:nth-child(odd){grid-column:span 2}
.card-meta{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:10px}
.ctag{font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:1.2px;color:var(--text3)}
.cage{font-size:9px;color:var(--text3);white-space:nowrap;flex-shrink:0}
.ctitle{font-family:var(--serif);font-size:20px;font-weight:600;color:var(--text);line-height:1.35;margin-bottom:10px}
.cbody{font-size:13px;color:var(--text2);line-height:1.6;margin-bottom:12px;display:-webkit-box;-webkit-line-clamp:4;line-clamp:4;-webkit-box-orient:vertical;overflow:hidden}
.why{background:transparent;border:none;border-radius:0;padding:0;margin-bottom:14px;font-size:12px;color:var(--text2);line-height:1.55}
.why strong{display:block;font-size:9px;color:var(--teal);text-transform:uppercase;letter-spacing:2px;font-weight:600;font-family:var(--sans);margin-bottom:5px}
.cfoot{display:flex;align-items:center;justify-content:space-between;border-top:1px solid var(--border);padding-top:12px;margin-top:4px}
.csrc-name{font-size:10px;color:var(--text3)}
.cfoot-right{display:flex;align-items:center;gap:10px}
.read-src{font-size:11px;color:var(--accent);text-decoration:none;transition:color .12s}
.read-src:hover{color:var(--gold)}
.save-btn{background:transparent;border:none;padding:2px 4px;border-radius:6px;font-size:15px;color:var(--save-idle);cursor:pointer;transition:color .15s,transform .1s;line-height:1}
.save-btn:hover{color:var(--save-on);transform:scale(1.15)}
.save-btn.saved{color:var(--save-on)}
.divider{font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:2px;color:var(--text3);padding:18px 28px 10px;border-bottom:1px solid var(--border)}
.sl{border-radius:6px;background:var(--surface2);animation:sh 1.5s infinite;margin-bottom:8px}
@keyframes sh{0%,100%{opacity:.3}50%{opacity:.7}}
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;text-align:center}
.empty-state .ei{font-size:36px;opacity:.2;margin-bottom:14px}
.empty-state .em{font-size:14px;color:var(--text2);margin-bottom:6px;font-weight:500}
.empty-state .eh{font-size:12px;color:var(--text3)}

/* ── MANAGE DATA ──────────────────────── */
#mgview{display:none;padding:24px 28px 48px;max-width:1000px;margin:0 auto}
.mg-controls{display:flex;align-items:center;gap:10px;margin-bottom:20px;flex-wrap:wrap}
.mg-date-input{padding:6px 11px;border-radius:var(--r);border:1px solid var(--border2);background:var(--surface);color:var(--text);font-family:var(--sans);font-size:12px;outline:none}
.mg-date-input:focus{border-color:var(--accent)}
.mg-btn{padding:6px 12px;border-radius:var(--r);border:1px solid var(--border2);background:var(--surface);color:var(--text2);font-size:11px;font-family:var(--sans);transition:all .12s;white-space:nowrap}
.mg-btn:hover{background:var(--surface2);color:var(--text)}
.mg-btn.active{background:var(--accent);border-color:var(--accent);color:#fff}
.mg-btn:disabled{opacity:.5;cursor:not-allowed}
.mg-nav-row{display:flex;align-items:center;gap:6px}
.mg-arrow{width:26px;height:26px;border-radius:7px;border:1px solid var(--border2);background:var(--surface);color:var(--text2);font-size:13px;display:flex;align-items:center;justify-content:center;transition:background .12s}
.mg-arrow:hover{background:var(--surface2);color:var(--text)}
.mg-date-label{font-size:12px;color:var(--text2);font-weight:500;min-width:130px;text-align:center}
.mg-section-filter{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:18px}
.mg-filter-chip{padding:3px 10px;border-radius:20px;border:1px solid var(--border2);background:transparent;color:var(--text3);font-size:10px;font-weight:500;font-family:var(--sans);transition:all .12s;cursor:pointer}
.mg-filter-chip:hover{background:var(--surface2);color:var(--text2)}
.mg-filter-chip.active{background:var(--accent);border-color:var(--accent);color:#fff}
.day-block{border:1px solid var(--border);border-radius:var(--rl);overflow:hidden;margin-bottom:14px}
.day-header{padding:11px 16px;background:var(--surface);display:flex;align-items:center;justify-content:space-between;cursor:pointer;user-select:none}
.day-date{font-size:13px;font-weight:600;color:var(--text)}
.day-count{font-size:10px;color:var(--text3);margin-left:10px}
.day-chevron{font-size:11px;color:var(--text3);transition:transform .2s}
.day-block.collapsed .day-chevron{transform:rotate(-90deg)}
.day-cards{padding:0 16px}
.day-block.collapsed .day-cards{display:none}
.mg-sec-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:1.2px;color:var(--text3);padding:14px 0 6px;border-bottom:1px solid var(--border)}
.weekly-summary{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);padding:16px;margin-bottom:20px}
.ws-title{font-family:var(--serif);font-size:17px;color:var(--text);margin-bottom:2px}
.ws-sub{font-size:11px;color:var(--text3);margin-bottom:14px}
.ws-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px}
.ws-day{border:1px solid var(--border);border-radius:var(--r);padding:10px 8px;cursor:pointer;transition:background .12s,border-color .12s;text-align:center}
.ws-day:hover{background:var(--surface2);border-color:var(--border2)}
.ws-day.today{border-color:var(--accent)}
.ws-day-name{font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.8px;color:var(--text3);margin-bottom:3px}
.ws-day-date{font-size:11px;color:var(--text2);margin-bottom:5px}
.ws-day-count{font-size:10px;color:var(--accent);font-weight:500}
.lr{font-size:10px;color:var(--text3);margin-top:8px;font-style:italic}

/* ── TOAST ────────────────────────────── */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--surface2);border:1px solid var(--border2);border-radius:24px;padding:9px 18px;font-size:12px;color:var(--text2);z-index:500;opacity:0;transition:opacity .25s;pointer-events:none;white-space:nowrap;max-width:calc(100vw - 28px);text-align:center}
.toast.show{opacity:1}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.fu{animation:fadeUp .22s ease both}

/* ── RESPONSIVE ───────────────────────── */
@media(max-width:1023px)and(min-width:768px){
  .home-grid{grid-template-columns:repeat(3,1fr)}
  .hdr,.#hview,#sview,#mgview{padding-left:20px;padding-right:20px}
}
@media(max-width:767px)and(min-width:480px){
  :root{--hh:54px}
  .hdr{padding:0 16px;height:54px;gap:10px}
  .brand-sub,.hdr-btn .hdr-btn-label{display:none}
  .hdr-btn{padding:6px 8px}
  .home-grid{grid-template-columns:repeat(2,1fr);gap:12px}
  #hview{padding:16px 16px 36px}
  .home-greeting{font-size:20px}
  .home-date-bar{flex-direction:column;align-items:flex-start;gap:4px}
  #sview,#mgview{padding:16px 16px 40px}
  .news-card{padding:16px 14px}
  .ctitle{font-size:17px}
  .ws-grid{grid-template-columns:repeat(4,1fr)}
  .sec-header-title{font-size:24px}
  #progress-panel{bottom:16px;min-width:0;width:calc(100vw - 32px)}
}
@media(max-width:479px){
  :root{--hh:52px}
  .hdr{padding:0 12px;height:52px;gap:6px}
  .brand-title{font-size:17px}
  .brand-sub,.hdr-sec-ey{display:none!important}
  .hdr-sec-name{font-size:15px}
  .hdr-btn .hdr-btn-label{display:none}
  .hdr-btn{padding:6px 7px;border-radius:8px;gap:2px}
  #hview{padding:12px 12px 32px}
  .home-greeting{font-size:17px}
  .home-date-bar{flex-direction:column;align-items:flex-start;gap:4px;margin-bottom:16px;padding-bottom:12px}
  .home-grid{grid-template-columns:repeat(2,1fr);gap:8px}
  .sc-body{padding:9px 10px 11px}
  .sc-label{font-size:8px;letter-spacing:.5px}
  .sc-title{font-size:11px;-webkit-line-clamp:2;line-clamp:2}
  .sc-src,.sc-age{font-size:8px}
  #sview,#mgview{padding:12px 12px 40px}
  .sec-header-title{font-size:21px}
  .cards-2col{grid-template-columns:1fr}
  .news-card{padding:16px 12px;border-right:none}
  .news-card:last-child:nth-child(odd){grid-column:span 1}
  .ctitle{font-size:17px}
  .cbody{font-size:12px}
  .ws-grid{grid-template-columns:repeat(3,1fr)}
  .mg-controls{gap:6px}
  .mg-section-filter{gap:4px}
  #progress-panel{min-width:0;width:calc(100vw - 24px)}
}
</style>
</head>
<body>

<header class="hdr">
  <div class="hdr-left">
    <button class="back-btn" id="back-btn" onclick="goHome()">&#8592;</button>
    <div class="brand-wrap" onclick="goHome()">
      <div class="brand-title">GCC Intelligence</div>
      <div class="brand-sub">Chairman's Daily Brief</div>
    </div>
    <div class="hdr-sec-info" id="hdr-sec-info">
      <div class="hdr-sec-ey" id="hdr-sec-ey"></div>
      <div class="hdr-sec-name" id="hdr-sec-name"></div>
    </div>
  </div>
  <div class="hdr-right">
    <button class="hdr-btn saved-btn" onclick="openSec('saved')">
      <span class="hdr-btn-icon">★</span><span class="hdr-btn-label" id="saved-count-lbl">Saved</span>
    </button>
    <button class="hdr-btn archive-btn" onclick="openSec('manage')">
      <span class="hdr-btn-icon">◫</span><span class="hdr-btn-label">Archive</span>
    </button>
    <button class="hdr-btn notif-btn" id="notif-btn" onclick="toggleNotifications()" title="Toggle push notifications">
      <span class="hdr-btn-icon" id="notif-icon">🔔</span><span class="hdr-btn-label notif-label" id="notif-label">Notify</span>
    </button>
    <button class="theme-btn" id="theme-toggle" onclick="toggleTheme()">☀</button>
  </div>
</header>

<!-- Live progress panel -->
<div id="progress-panel">
  <div class="pp-title">Fetching Intelligence Brief</div>
  <div class="pp-status" id="pp-status">Starting…</div>
  <div class="progress-bar-wrap"><div class="progress-bar" id="progress-bar"></div></div>
  <div class="pp-rows" id="pp-rows"></div>
</div>

<div id="page">
  <div id="hview">
    <div class="home-date-bar">
      <div>
        <div class="home-greeting" id="home-greeting">Good morning, <span>GM Rao, Sir</span></div>
        <div class="home-date" id="home-date"></div>
      </div>
      <div style="text-align:right">
        <div class="home-sub" style="font-size:10px;color:var(--teal)">GCC AI &amp; Technology Intelligence</div>
        <div class="lr" id="lr"></div>
      </div>
    </div>
    <div class="home-grid-label">Intelligence Sections</div>
    <div class="home-grid" id="home-grid"></div>
  </div>

  <div id="sview">
    <div class="sec-header">
      <div class="sec-header-ey" id="sec-ey"></div>
      <div class="sec-header-title" id="sec-title"></div>
    </div>
    <div id="cards"></div>
  </div>

  <div id="mgview">
    <div class="sec-header">
      <div class="sec-header-ey">Archive</div>
      <div class="sec-header-title">Past Editions</div>
    </div>
    <div class="mg-controls">
      <div class="mg-nav-row">
        <button class="mg-arrow" onclick="mgShiftDay(-1)">&#8249;</button>
        <span class="mg-date-label" id="mg-date-label">Today</span>
        <button class="mg-arrow" onclick="mgShiftDay(1)" id="mg-next-btn">&#8250;</button>
      </div>
      <input type="date" class="mg-date-input" id="mg-date-input" onchange="mgPickDate(this.value)">
      <button class="mg-btn" id="mg-week-btn" onclick="mgToggleWeek()">This Week</button>
      <button class="mg-btn" id="refresh-btn" onclick="clearAndRefresh()" style="margin-left:auto;border-color:var(--red);color:var(--red)">🗑 Clear &amp; Refresh</button>
    </div>
    <div class="mg-section-filter" id="mg-sec-filter"></div>
    <div id="mg-content"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const SECS = [
  {id:'exec',      name:'Executive Snapshot',    ey:"Chairman's 60-Second Scan",   grad:'linear-gradient(135deg,#1e3a8a,#3b82f6)', ic:'#93c5fd'},
  {id:'themes',    name:'Strategic Themes',       ey:'Patterns · Strategic Signals', grad:'linear-gradient(135deg,#4c1d95,#8b5cf6)', ic:'#c4b5fd'},
  {id:'deals',     name:'Deals & Capital',        ey:'Ecosystem Clustering',         grad:'linear-gradient(135deg,#064e3b,#10b981)', ic:'#6ee7b7'},
  {id:'risks',     name:'Risks & Opportunities',  ey:'CEO-Level Framing',            grad:'linear-gradient(135deg,#78350f,#f59e0b)', ic:'#fcd34d'},
  {id:'competitor',name:'Market Moves',           ey:'Who Moved and Why',            grad:'linear-gradient(135deg,#92400e,#f59e0b)', ic:'#fcd34d'},
  {id:'talent',    name:'Talent Signals',         ey:'Hiring · Salaries · Risk',     grad:'linear-gradient(135deg,#134e4a,#14b8a6)', ic:'#5eead4'},
  {id:'policy',    name:'Policy & Regulation',    ey:'Compliance · Act or Monitor',  grad:'linear-gradient(135deg,#7f1d1d,#ef4444)', ic:'#fca5a5'},
  {id:'tech',      name:'Technology Signals',     ey:'GCC-Relevant Shifts Only',     grad:'linear-gradient(135deg,#1e40af,#60a5fa)', ic:'#93c5fd'},
];

// accent colour from gradient
function accentColor(s) { return (s.grad.match(/#[0-9a-fA-F]{6}/) || ['#3b82f6'])[0]; }

const cache = {};
let active = null;
const savedTitles = new Set();
const itemMap = {};
let _refreshing = false;

// ── Web Push ──────────────────────────────────────────────────────────────────
let _swReg = null;
function urlB64ToUint8(b64) {
  const pad = '='.repeat((4 - b64.length % 4) % 4);
  const raw = atob((b64 + pad).replace(/-/g,'+').replace(/_/g,'/'));
  return Uint8Array.from(raw, c => c.charCodeAt(0));
}
function _setNotifUI(on) {
  const btn = document.getElementById('notif-btn');
  const lbl = document.getElementById('notif-label');
  const icon = document.getElementById('notif-icon');
  if (!btn) return;
  btn.classList.toggle('active', on);
  if (lbl) lbl.textContent = on ? 'ON' : 'Notify';
  if (icon) icon.textContent = on ? '🔔' : '🔕';
  btn.title = on ? 'Notifications ON — click to disable' : 'Enable push notifications';
}
async function setupPush() {
  if (!('serviceWorker' in navigator) || !('PushManager' in window)) return;
  try {
    _swReg = await navigator.serviceWorker.register('/sw.js');
    const existing = await _swReg.pushManager.getSubscription();
    _setNotifUI(!!existing);
  } catch {}
}
async function toggleNotifications() {
  if (!('serviceWorker' in navigator) || !('PushManager' in window)) {
    toast('Push notifications not supported in this browser'); return;
  }
  if (Notification.permission === 'denied') {
    toast('Notifications blocked — please allow them in browser settings'); return;
  }
  try {
    if (!_swReg) _swReg = await navigator.serviceWorker.register('/sw.js');
    // Wait for SW to be ready before using pushManager
    await navigator.serviceWorker.ready;
    const existing = await _swReg.pushManager.getSubscription();
    if (existing) {
      // ── TURN OFF ──────────────────────────────────────────────────────────
      await existing.unsubscribe();
      fetch('/api/unsubscribe',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({endpoint:existing.endpoint})}).catch(()=>{});
      _setNotifUI(false);
      toast('🔕 Notifications disabled');
    } else {
      // ── TURN ON ───────────────────────────────────────────────────────────
      const perm = await Notification.requestPermission();
      if (perm !== 'granted') { toast('Permission denied — check browser settings'); return; }
      let keyData;
      try { keyData = await (await fetch('/api/vapidkey')).json(); }
      catch { toast('Could not reach server for push key'); return; }
      const sub = await _swReg.pushManager.subscribe({
        userVisibleOnly: true,
        applicationServerKey: urlB64ToUint8(keyData.key),
      });
      await fetch('/api/subscribe',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({subscription:sub.toJSON()})});
      _setNotifUI(true);
      toast('🔔 Notifications enabled — you will get alerts per section');
      // Send a test notification so user knows it works
      setTimeout(() => {
        fetch('/api/push-notify',{method:'POST',headers:{'Content-Type':'application/json'},
          body:JSON.stringify({mode:'section',section:'exec',headline:'Notifications are working — you will get alerts like this.',url:'/'})
        }).catch(()=>{});
      }, 1500);
    }
  } catch(e) { toast('Notification error: '+e.message); console.error(e); }
}

// ── Formatting ────────────────────────────────────────────────────────────────
function fmtDate(d) {
  const D=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'], M=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return `${D[d.getDay()]}, ${String(d.getDate()).padStart(2,'0')} ${M[d.getMonth()]} ${d.getFullYear()}`;
}
function fmtAge(str) {
  if (!str) return '';
  const mon=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return str.replace(/(\d{4})-(\d{2})-(\d{2})(?:T[^"'\s·]*)*/g,(_,y,m,d)=>`${d} ${mon[+m-1]} ${y}`);
}
function isRecentArticle(item) {
  if (!item?.age) return true;
  const m = fmtAge(item.age).match(/(\d{1,2})\s+(\w{3})\s+(\d{4})/);
  if (!m) return true;
  const M={Jan:0,Feb:1,Mar:2,Apr:3,May:4,Jun:5,Jul:6,Aug:7,Sep:8,Oct:9,Nov:10,Dec:11};
  const d = new Date(+m[3], M[m[2]]??-1, +m[1]);
  if (isNaN(d)) return true;
  const now=new Date(), cut=new Date(now.getFullYear(),now.getMonth(),now.getDate()-7);
  return d>=cut && d<=now;
}

// ── Theme ─────────────────────────────────────────────────────────────────────
function toggleTheme() {
  const html=document.documentElement, dark=html.getAttribute('data-theme')==='dark', next=dark?'light':'dark';

// ── Toast ─────────────────────────────────────────────────────────────────────
let _tt;
function toast(m, d=2800) {
  const t=document.getElementById('toast'); t.textContent=m; t.classList.add('show');
  clearTimeout(_tt); _tt=setTimeout(()=>t.classList.remove('show'),d);
}

// ── Item key ──────────────────────────────────────────────────────────────────
function itemKey(title) {
  let h=0; for(let i=0;i<title.length;i++){h=((h<<5)-h)+title.charCodeAt(i);h|=0;} return 'k'+Math.abs(h);
}

// ── Saved ─────────────────────────────────────────────────────────────────────
function updateSavedCount() {
  const n=savedTitles.size, el=document.getElementById('saved-count-lbl');
  if(el) el.textContent = n?`Saved (${n})`:'Saved';
}
async function toggleSave(key,evt) {
  if(evt) evt.stopPropagation();
  const item=itemMap[key]; if(!item) return;
  const was=savedTitles.has(item.title);
  was?savedTitles.delete(item.title):savedTitles.add(item.title);
  document.querySelectorAll(`.save-btn[data-key="${key}"]`).forEach(b=>{b.classList.toggle('saved',!was);b.textContent=was?'☆':'★';});
  updateSavedCount();
  try {
    await fetch('/api/save',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({title:item.title,item,action:was?'unsave':'save'})});
    if(!was){if(!cache.saved)cache.saved=[];cache.saved=[item,...cache.saved.filter(i=>i.title!==item.title)];}
    else{if(cache.saved)cache.saved=cache.saved.filter(i=>i.title!==item.title);if(active==='saved')renderCards('saved');}
    toast(was?'Removed from saved':'Saved ✓');
  } catch {
    was?savedTitles.add(item.title):savedTitles.delete(item.title);
    document.querySelectorAll(`.save-btn[data-key="${key}"]`).forEach(b=>{b.classList.toggle('saved',was);b.textContent=was?'★':'☆';});
    updateSavedCount();
  }
}
async function loadSaved() {
  try {
    const r=await fetch('/api/saved'); if(!r.ok) return;
    const items=await r.json();
    items.forEach(item=>{savedTitles.add(item.title);itemMap[itemKey(item.title)]=item;});
    cache.saved=items; updateSavedCount();
  } catch {}
}

  document.getElementById('theme-meta').setAttribute('content', theme==='dark'?'#08090f':'#ffffff');

  document.getElementById('home-date').textContent=fmtDate(d);

  try {
    const r=await fetch('/api/data');
    if(r.ok) {
      const data=await r.json();
      Object.entries(data).forEach(([sec,items])=>{
        if(Array.isArray(items)) cache[sec]=items.filter(isRecentArticle);
      });

  await loadSaved();

function _renderHome() {
  const grid=document.getElementById('home-grid'); if(!grid) return;

    const item=cache[s.id]?.[0];

        </div>

// ── Navigation ────────────────────────────────────────────────────────────────
function goHome() {
  active=null;

// ── Render cards ──────────────────────────────────────────────────────────────
function renderCards(id) {
  const w=document.getElementById('cards');
  if(id==='saved') {
    const items=cache.saved||[];
    w.innerHTML=items.length?'<div class="cards-2col">'+items.map(i=>cH(i,null)).join('')+'</div>'
      :`<div class="empty-state"><div class="ei">★</div><div class="em">No saved articles yet</div><div class="eh">Tap ☆ on any article to save it here</div></div>`;

      (o.length?'<div class="divider">Opportunity</div><div class="cards-2col">'+o.map(i=>cH(i,id)).join('')+'</div>':'');
    if(!h) h='<div class="cards-2col">'+items.map(i=>cH(i,id)).join('')+'</div>';
  } else {
    h='<div class="cards-2col">'+items.map(i=>cH(i,id)).join('')+'</div>';
  }
  w.innerHTML=h; window.scrollTo(0,0);
}

function cH(item,secId) {
  const key=itemKey(item.title); itemMap[key]=item;
  const on=savedTitles.has(item.title);
  const srcLink=item.url?`<a class="read-src" href="${item.url}" target="_blank" rel="noopener">↗ Read source</a>`:'';
  return `<div class="news-card fu">
  <div class="card-meta"><span class="ctag">${fmtAge(item.tag||'')}</span><span class="cage">${fmtAge(item.age)}</span></div>
  <div class="ctitle">${item.title}</div>
  <div class="cbody">${item.body}</div>
  <div class="why">${item.why}</div>
  <div class="cfoot">
    <span class="csrc-name">${item.src||''}</span>
    <div class="cfoot-right">
      ${srcLink}
      <button class="save-btn${on?' saved':''}" data-key="${key}" onclick="toggleSave('${key}',event)">${on?'★':'☆'}</button>
    </div>
  </div>
</div>`;
}

function skelHTML() {
  return '<div class="cards-2col">'+Array(4).fill(0).map(()=>`
  <div class="news-card">
    <div style="display:flex;gap:10px;margin-bottom:14px"><div class="sl" style="height:11px;flex:1"></div><div class="sl" style="height:11px;width:60px"></div></div>
    <div class="sl" style="height:22px;width:100%;margin-bottom:8px"></div>
    <div class="sl" style="height:22px;width:80%;margin-bottom:16px"></div>
    <div class="sl" style="height:13px;width:100%;margin-bottom:6px"></div>
    <div class="sl" style="height:13px;width:75%;margin-bottom:18px"></div>
    <div class="sl" style="height:44px;width:100%;border-radius:8px"></div>
  </div>`).join('')+'</div>';
}

// ── Progress panel ────────────────────────────────────────────────────────────
function ppInit() {
  const rows=document.getElementById('pp-rows');
  rows.innerHTML=SECS.map(s=>`<div class="pp-row" id="pp-${s.id}">
    <div class="pp-dot"></div><span class="pp-label">${s.name}</span><span class="pp-count" id="pp-c-${s.id}"></span>
  </div>`).join('');
}
function ppShow() { document.getElementById('progress-panel').classList.add('visible'); }
function ppHide() { document.getElementById('progress-panel').classList.remove('visible'); }
function ppSetStatus(txt) { document.getElementById('pp-status').textContent=txt; }
function ppSetBar(pct) { document.getElementById('progress-bar').style.width=Math.min(100,pct)+'%'; }
function ppRowState(id,state,count) {
  const row=document.getElementById('pp-'+id); if(!row) return;
  row.className='pp-row '+state;
  const c=document.getElementById('pp-c-'+id);
  if(c) c.textContent=state==='done'&&count?count+' articles':state==='fail'?'failed':state==='active'?'fetching…':'';
}

// ── Clear & Refresh (SSE-based, sequential) ───────────────────────────────────
async function clearAndRefresh() {
  if(_refreshing) { toast('Refresh already in progress'); return; }
  if(!confirm('Fetch fresh news for all 8 sections?\n\nThis calls AI for each section sequentially and takes ~2 minutes.')) return;
  _refreshing=true;

  // Disable the refresh button
  const btn=document.getElementById('refresh-btn');
  if(btn) { btn.disabled=true; btn.textContent='Refreshing…'; }

  ppInit(); ppShow(); ppSetStatus('Starting refresh…'); ppSetBar(0);
  SECS.forEach(s=>ppRowState(s.id,'',''));

  goHome(); _renderHome();

  const es=new EventSource('/api/refresh-all');
  // Kick off with clear=true via a POST (EventSource is GET-only, so we signal via a header workaround)
  // Instead use fetch+ReadableStream for POST with SSE
  es.close(); // close the EventSource — use fetch stream instead

  let reader;
  try {
    const resp=await fetch('/api/refresh-all',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({clear:true})});
    if(!resp.ok||!resp.body) throw new Error('Server error '+resp.status);
    reader=resp.body.getReader();
    const dec=new TextDecoder();
    let buf='';
    let done_count=0;

    while(true) {
      const {done,value}=await reader.read();
      if(done) break;
      buf+=dec.decode(value,{stream:true});
      const lines=buf.split('\n');
      buf=lines.pop(); // keep incomplete line
      for(const line of lines) {
        if(!line.startsWith('data:')) continue;
        let ev; try { ev=JSON.parse(line.slice(5).trim()); } catch { continue; }

        if(ev.type==='start') {
          ppRowState(ev.section,'active');
          ppSetStatus(`Fetching ${SECS.find(s=>s.id===ev.section)?.name||ev.section}… (${ev.index+1}/${ev.total})`);
          ppSetBar((ev.index/ev.total)*100);
        } else if(ev.type==='done') {
          done_count++;
          ppRowState(ev.section,'done',ev.count);
          if(ev.items) { cache[ev.section]=ev.items; _renderHome(); if(active===ev.section) renderCards(ev.section); }
          ppSetBar(((done_count)/SECS.length)*100);
        } else if(ev.type==='fail') {
          ppRowState(ev.section,'fail');
        } else if(ev.type==='wait') {
          ppSetStatus(`Waiting before next section…`);
        } else if(ev.type==='complete') {
          ppSetBar(100);
          ppSetStatus(`Done — ${ev.succeeded} of ${ev.succeeded+ev.failed} sections loaded`);
          const now=new Date(), lrel=document.getElementById('lr');
          if(lrel) lrel.textContent='Last refreshed: '+now.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'})+' · '+fmtDate(now);
          setTimeout(ppHide, 3000);
          toast(`Brief updated — ${ev.succeeded} sections loaded ✓`);
        } else if(ev.type==='error') {
          ppSetStatus('Error: '+ev.message);
          toast('Refresh error: '+ev.message, 5000);
        }
      }
    }
  } catch(e) {
    ppSetStatus('Connection error: '+e.message);
    toast('Refresh failed: '+e.message, 5000);
  } finally {
    _refreshing=false;
    if(btn) { btn.disabled=false; btn.textContent='🗑 Clear & Refresh'; }
    // Re-fetch from DB in case any sections were saved but SSE items weren't sent
    try {
      const r=await fetch('/api/data');
      if(r.ok){const data=await r.json();Object.entries(data).forEach(([sec,items])=>{if(Array.isArray(items)&&items.length>0)cache[sec]=items;});_renderHome();}
    } catch {}
  }
}

// ── MANAGE DATA ───────────────────────────────────────────────────────────────
let mgDate=new Date().toISOString().split('T')[0], mgWeekMode=false, mgActiveFilter='all';
function mgInit(){document.getElementById('mg-date-input').value=mgDate;mgBuildFilter();}
function mgBuildFilter(){
  document.getElementById('mg-sec-filter').innerHTML=
    [{id:'all',name:'All'}].concat(SECS.map(s=>({id:s.id,name:s.name}))).map(f=>
      `<button class="mg-filter-chip${mgActiveFilter===f.id?' active':''}" onclick="mgSetFilter('${f.id}')">${f.name}</button>`
    ).join('');
}
function mgSetFilter(id){mgActiveFilter=id;mgBuildFilter();mgWeekMode?mgLoadWeek():mgLoadDay(mgDate);}
function mgShiftDay(d){const dt=new Date(mgDate);dt.setDate(dt.getDate()+d);const s=dt.toISOString().split('T')[0];if(s>new Date().toISOString().split('T')[0])return;mgPickDate(s);}
function mgPickDate(val){mgDate=val;mgWeekMode=false;document.getElementById('mg-date-input').value=val;document.getElementById('mg-week-btn').classList.remove('active');mgLoadDay(val);}
function mgToggleWeek(){mgWeekMode=!mgWeekMode;document.getElementById('mg-week-btn').classList.toggle('active',mgWeekMode);mgWeekMode?mgLoadWeek():mgLoadDay(mgDate);}
async function mgLoadDay(date){
  document.getElementById('mg-content').innerHTML=skelHTML();
  const today=new Date().toISOString().split('T')[0];
  document.getElementById('mg-date-label').textContent=(date===today?'Today · ':'')+new Date(date+'T12:00:00').toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'short',year:'numeric'});
  document.getElementById('mg-next-btn').disabled=date>=today;
  try{const r=await fetch('/api/history?date='+date);mgRenderDay((await r.json()).sections||{});}
  catch{document.getElementById('mg-content').innerHTML='<div style="padding:28px;text-align:center;font-size:12px;color:var(--text3)">Failed to load</div>';}
}
async function mgLoadWeek(){
  document.getElementById('mg-content').innerHTML=skelHTML();
  document.getElementById('mg-date-label').textContent='This Week (Mon – Fri)';
  try{const r=await fetch('/api/weekly');mgRenderWeek(await r.json());}
  catch{document.getElementById('mg-content').innerHTML='<div style="padding:28px;text-align:center;font-size:12px;color:var(--text3)">Failed to load</div>';}
}
function mgRenderDay(sections){
  const order=mgActiveFilter==='all'?SECS.map(s=>s.id):[mgActiveFilter];
  let html='',total=0;
  for(const sid of order){const items=sections[sid]||[];if(!items.length)continue;total+=items.length;const sec=SECS.find(s=>s.id===sid)||{name:sid,ic:'var(--text3)'};html+=`<div class="mg-sec-label" style="color:${sec.ic}">${sec.name}</div><div class="cards-2col">${items.map(i=>cH(i,sid)).join('')}</div>`;}
  document.getElementById('mg-content').innerHTML=total?html:`<div class="empty-state"><div class="ei">◫</div><div class="em">No data for this date</div><div class="eh">Use Clear &amp; Refresh to load fresh news</div></div>`;
}
function mgRenderWeek(data){
  const today=new Date().toISOString().split('T')[0],dayMap={};
  (data.days||[]).forEach(d=>{dayMap[d.date]=d;});
  const start=new Date((data.start||today)+'T12:00:00');
  let gridH=`<div class="weekly-summary"><div class="ws-title">This Week</div><div class="ws-sub">${data.start||''} → ${data.end||''}</div><div class="ws-grid">`;
  for(let i=0;i<5;i++){
    const d=new Date(start);d.setDate(start.getDate()+i);const ds=d.toISOString().split('T')[0];
    const dd=dayMap[ds],total=dd?Object.values(dd.sections).reduce((s,a)=>s+a.length,0):0,future=ds>today;
    gridH+=`<div class="ws-day${ds===today?' today':''}" onclick="${future?'':` mgPickDate('${ds}');mgWeekMode=false;document.getElementById('mg-week-btn').classList.remove('active')`}">
      <div class="ws-day-name">${d.toLocaleDateString('en-GB',{weekday:'short'})}</div>
      <div class="ws-day-date">${d.toLocaleDateString('en-GB',{day:'numeric',month:'short'})}</div>
      <div class="ws-day-count">${future?'—':total?total+' items':'No data'}</div>
    </div>`;
  }
  gridH+='</div></div>';
  const order=mgActiveFilter==='all'?SECS.map(s=>s.id):[mgActiveFilter];
  let blocks='';
  for(const dd of (data.days||[])){
    const total=order.reduce((s,sid)=>s+(dd.sections[sid]||[]).length,0);if(!total)continue;
    const label=dd.date===today?'Today':new Date(dd.date+'T12:00:00').toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'short'});
    blocks+=`<div class="day-block" id="db-${dd.date}">
      <div class="day-header" onclick="mgToggleBlock('${dd.date}')">
        <div style="display:flex;align-items:center"><span class="day-date">${label}</span><span class="day-count">${total} items</span></div>
        <span class="day-chevron">▾</span>
      </div>
      <div class="day-cards">${order.flatMap(sid=>{const items=dd.sections[sid]||[];if(!items.length)return[];const sec=SECS.find(s=>s.id===sid)||{name:sid,ic:'var(--text3)'};return[`<div class="mg-sec-label" style="color:${sec.ic}">${sec.name}</div><div class="cards-2col">${items.map(i=>cH(i,sid)).join('')}</div>`];}).join('')}</div>
    </div>`;
  }
  document.getElementById('mg-content').innerHTML=gridH+(blocks||`<div class="empty-state"><div class="ei">◫</div><div class="em">No history this week</div></div>`);
}
function mgToggleBlock(date){document.getElementById('db-'+date)?.classList.toggle('collapsed');}
